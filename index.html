const C = window.Core;
/* Must match the RESULTS_SECRET env var on the server. This lives in client
   source so it only deters casual abuse — the endpoint only messages YOUR
   Telegram, so the worst case of a leak is spam you can stop by rotating it. */
const RESULTS_SECRET = 'begench1994garahan';
const DIM_META = {
  vocab:{label:'🧠 Словарь',color:'var(--blue)'},
  grammar:{label:'✍ Грамматика',color:'var(--green)'},
  reading:{label:'📖 Чтение',color:'var(--gold)'},
  listening:{label:'🎧 Аудирование',color:'var(--purple)'},
  kanji:{label:'🈶 Кандзи',color:'var(--red)'}
};
const FOCUS_LABEL = {vocab:'Словарь',grammar:'Грамматика',reading:'Чтение',listening:'Аудирование',kanji:'Кандзи'};

/* ── TTS (free listening) ── */
let jaVoice=null;
function pickVoice(){ const vs=speechSynthesis.getVoices(); jaVoice=vs.find(v=>v.lang==='ja-JP')||vs.find(v=>v.lang&&v.lang.startsWith('ja'))||null; }
if('speechSynthesis' in window){ pickVoice(); speechSynthesis.onvoiceschanged=pickVoice; }
function speak(text){ if(!('speechSynthesis' in window))return; try{speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(text);u.lang='ja-JP';u.rate=.9;if(jaVoice)u.voice=jaVoice;speechSynthesis.speak(u);}catch(e){} }
/* Speech registry — buttons reference a short key instead of inlining text,
   so apostrophes / quotes / backslashes in content can never break markup. */
const _sayReg={}; let _sayN=0;
function sayRef(t){ const k='s'+(++_sayN); _sayReg[k]=t||''; return k; }
function sayNow(k){ speak(_sayReg[k]||''); }

/* ── pronunciation check (Web Speech API) ── */
function checkPronunciation(target,btn){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR)return;
  const r=new SR(); r.lang='ja-JP'; r.interimResults=false; r.maxAlternatives=3;
  btn.textContent='🎤…'; btn.style.background='var(--gold-soft)'; btn.style.color='var(--gold)';
  r.onresult=(e)=>{
    const heard=e.results[0][0].transcript.trim();
    const cleanTarget=(target||'').replace(/[をはがでにのとへや]/g,'').trim();
    const cleanHeard=heard.replace(/[をはがでにのとへや]/g,'').trim();
    const ok=cleanHeard.includes(cleanTarget)||cleanTarget.includes(cleanHeard)||heard===target;
    btn.textContent=ok?'✅':'❌';
    btn.style.background=ok?'var(--green-soft)':'var(--red-soft)';
    btn.style.color=ok?'var(--green)':'var(--red)';
    btn.title=ok?'Правильно! Услышала: '+heard:'Услышала: '+heard+' (цель: '+target+')';
    if(ok)C.haptic('success');else C.haptic('error');
    setTimeout(()=>{btn.textContent='🎤';btn.style.background='var(--green-soft)';btn.style.color='var(--green)';},3000);
  };
  r.onerror=()=>{btn.textContent='🎤';btn.style.background='var(--green-soft)';btn.style.color='var(--green)';};
  r.onend=()=>{if(btn.textContent==='🎤…'){btn.textContent='🎤';btn.style.background='var(--green-soft)';btn.style.color='var(--green)';}};
  r.start();
}

/* ── particles & confetti (the juice) ── */
function particle(e,text,color){const p=document.createElement('div');p.className='particle';p.textContent=text;p.style.color=color||'var(--green)';let x=innerWidth/2,y=innerHeight/2;if(e&&e.touches&&e.touches[0]){x=e.touches[0].clientX;y=e.touches[0].clientY}else if(e&&e.clientX){x=e.clientX;y=e.clientY}p.style.left=(x+(Math.random()-.5)*40)+'px';p.style.top=(y-40)+'px';document.body.appendChild(p);setTimeout(()=>p.remove(),800)}
function confetti(){C.haptic('celebrate');const cv=document.getElementById('confetti'),ctx=cv.getContext('2d');cv.width=innerWidth;cv.height=innerHeight;const cols=['#ff4b4b','#00c853','#2979ff','#ffb300','#8e24aa'],ps=[];for(let i=0;i<110;i++)ps.push({x:cv.width/2,y:cv.height/2+100,vx:(Math.random()-.5)*20,vy:(Math.random()-1)*20-5,size:Math.random()*10+5,color:cols[i%5],rot:Math.random()*360,rs:(Math.random()-.5)*10});(function d(){ctx.clearRect(0,0,cv.width,cv.height);let on=false;ps.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.5;p.rot+=p.rs;if(p.y<cv.height)on=true;ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot*Math.PI/180);ctx.fillStyle=p.color;ctx.fillRect(-p.size/2,-p.size/2,p.size,p.size);ctx.restore()});if(on)requestAnimationFrame(d);else ctx.clearRect(0,0,cv.width,cv.height)})()}

/* ── SOUND ENGINE (Web Audio API — no files, synthesized tones) ── */
let _audioCtx=null, _soundOn=true;
function audioCtx(){ if(!_audioCtx) try{_audioCtx=new (window.AudioContext||window.webkitAudioContext)()}catch(e){} return _audioCtx; }
function tone(freq,dur,type,vol){ if(!_soundOn)return; const ctx=audioCtx(); if(!ctx)return; try{const o=ctx.createOscillator(),g=ctx.createGain();o.type=type||'sine';o.frequency.value=freq;g.gain.value=vol||.15;o.connect(g);g.connect(ctx.destination);o.start();g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+(dur||.15));o.stop(ctx.currentTime+(dur||.15))}catch(e){} }
const SFX={
  correct(){ tone(880,.1,'sine',.12); setTimeout(()=>tone(1320,.12,'sine',.1),60); },
  wrong(){ tone(220,.2,'sawtooth',.1); setTimeout(()=>tone(180,.15,'sawtooth',.08),100); },
  combo(n){ const base=660+Math.min(n,15)*40; tone(base,.08,'triangle',.1); setTimeout(()=>tone(base*1.5,.1,'triangle',.08),50); },
  levelup(){ [523,659,784,1047].forEach((f,i)=>setTimeout(()=>tone(f,.15,'triangle',.12),i*80)); },
  badge(){ [784,988,1175].forEach((f,i)=>setTimeout(()=>tone(f,.12,'sine',.1),i*60)); },
  flip(){ tone(600,.06,'sine',.08); },
  whoosh(){ tone(300,.15,'sine',.06); },
  goalDone(){ [659,784,988,1319].forEach((f,i)=>setTimeout(()=>tone(f,.12,'triangle',.1),i*60)); }
};

/* ── count-up animation helper ── */
function countUp(el,target,suffix,dur){ suffix=suffix||''; dur=dur||800; const start=0, t0=performance.now(); function step(t){ const p=Math.min(1,(t-t0)/dur); const val=Math.round(start+(target-start)*(1-Math.pow(1-p,3))); el.textContent=val+suffix; if(p<1)requestAnimationFrame(step); } requestAnimationFrame(step); }

/* ── NOTIFICATION ENGINE (local, no server needed) ── */
/* Works on iOS 16.4+ when app is added to home screen.
   Notifications fire while the app is open (or was recently open).
   The scheduler checks every minute and fires at the user's chosen time. */
let _notifTimer=null;

function notifSupported(){ return 'Notification' in window; }
function notifPermitted(){ return notifSupported() && Notification.permission==='granted'; }

function requestNotifPermission(){
  if(!notifSupported()){ return; }
  Notification.requestPermission().then(result=>{
    updateNotifUI();
    if(result==='granted'){
      // Send a welcome notification
      try{ new Notification('🌸 Японский Махым', {body:'Уведомления включены! Будем напоминать держать стрик.', icon:'/icon-192.png'}); }catch(e){}
      startNotifScheduler();
    }
  });
}

function getNotifSettings(){
  const s=C.getSettings();
  if(!s.notifications) s.notifications={streak:false,review:false,goal:false,time:'19:00',lastStreak:'',lastReview:'',lastGoal:''};
  return s.notifications;
}
function saveNotifSettings(n){
  const s=C.getSettings(); s.notifications=n; C.setSettings(s);
}

function updateNotifUI(){
  const permitArea=document.getElementById('notif-permit-area');
  const controls=document.getElementById('notif-controls');
  if(!permitArea) return;
  if(!notifSupported()){
    permitArea.innerHTML='<div style="font-size:12px;color:rgba(255,255,255,.4);font-weight:600;padding:6px 0">Уведомления не поддерживаются на этом устройстве.</div>';
    return;
  }
  if(Notification.permission==='default'){
    permitArea.innerHTML='<button class="notif-permit-btn" onclick="requestNotifPermission()">Включить уведомления</button>';
    controls.style.display='none';
  } else if(Notification.permission==='denied'){
    permitArea.innerHTML='<div style="font-size:12px;color:rgba(255,255,255,.4);font-weight:600;padding:6px 0">Заблокировано — включите в Настройки → Safari → Уведомления</div>';
    controls.style.display='none';
  } else {
    permitArea.innerHTML='';
    controls.style.display='block';
    const n=getNotifSettings();
    document.getElementById('notif-streak').classList.toggle('on',n.streak);
    document.getElementById('notif-review').classList.toggle('on',n.review);
    document.getElementById('notif-goal').classList.toggle('on',n.goal);
    document.getElementById('notif-time-input').value=n.time||'19:00';
  }
}

function toggleNotif(type){
  const n=getNotifSettings();
  n[type]=!n[type];
  saveNotifSettings(n);
  updateNotifUI();
  C.haptic('light');
  if(n[type]) SFX.correct();
  // Re-schedule if any are on
  if(n.streak||n.review||n.goal) startNotifScheduler();
  else stopNotifScheduler();
}

function setNotifTime(time){
  const n=getNotifSettings(); n.time=time; saveNotifSettings(n);
  C.haptic('light');
  // Re-schedule
  startNotifScheduler();
}

function stopNotifScheduler(){
  if(_notifTimer){ clearInterval(_notifTimer); _notifTimer=null; }
}

function startNotifScheduler(){
  stopNotifScheduler();
  if(!notifPermitted()) return;
  const n=getNotifSettings();
  if(!n.streak && !n.review && !n.goal) return;
  // Check every 60 seconds
  _notifTimer=setInterval(checkAndFireNotifications,60000);
  // Also check once immediately after 2 seconds
  setTimeout(checkAndFireNotifications,2000);
}

function checkAndFireNotifications(){
  if(!notifPermitted()) return;
  const n=getNotifSettings();
  const now=new Date();
  const today=now.toISOString().slice(0,10);
  const currentTime=String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
  const reminderTime=n.time||'19:00';
  // Only fire at or after the reminder time, and only once per day per type
  if(currentTime < reminderTime) return;

  // Streak reminder
  if(n.streak && n.lastStreak!==today){
    const streak=C.getStreakData();
    const msg=streak.count===0
      ? 'Начни новый стрик сегодня — всего 5 минут!'
      : streak.count<7
        ? `Не прерывай стрик из ${streak.count} дней! Заходи заниматься.`
        : streak.count<30
          ? `🔥 ${streak.count} дней подряд! Поддержи огонь сегодня.`
          : `🏆 ${streak.count} дней! Ты неудержима — не останавливайся.`;
    fireNotification('🔥 Напоминание о стрике', msg);
    n.lastStreak=today; saveNotifSettings(n);
  }

  // Review due alert
  if(n.review && n.lastReview!==today){
    const pool=[...C.ITEMS.vocab,...C.ITEMS.grammar,...C.ITEMS.kanji];
    const dueN=pool.filter(it=>C.itemState(it.id).attempts>0 && C.isDue(it.id)).length;
    if(dueN>0){
      fireNotification('🔁 Повторение', `${dueN} карточк${dueN>1?'ек':'ка'} ждёт повторения. Поддержи память!`);
      n.lastReview=today; saveNotifSettings(n);
    }
  }

  // Daily goal nudge
  if(n.goal && n.lastGoal!==today){
    const goal=C.getDailyGoal();
    if(!C.isDailyGoalDone() && goal.target-goal.current>0){
      const remaining=goal.target-goal.current;
      fireNotification('🎯 Цель дня', `Осталось всего ${remaining} элемент${remaining>1?'ов':'а'} до цели дня!`);
      n.lastGoal=today; saveNotifSettings(n);
    }
  }
}

/* ── count-up animation for hero stats ── */
function animateStat(el,target,suffix,dur){
  suffix=suffix||''; dur=dur||600;
  const startVal=parseInt(el.textContent)||0;
  if(startVal===target){ el.textContent=target+suffix; return; }
  const t0=performance.now();
  function step(t){
    const p=Math.min(1,(t-t0)/dur);
    const val=Math.round(startVal+(target-startVal)*(1-Math.pow(1-p,3)));
    el.textContent=val+suffix;
    if(p<1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

/* ── Telegram report (fire-and-forget with offline queue) ── */
function report(type,payload){
  const body=JSON.stringify({type,secret:RESULTS_SECRET,name:'Mahym',momentum:C.getMomentum().value,...payload});
  try{
    fetch('/api/results',{method:'POST',headers:{'Content-Type':'application/json'},body}).catch(()=>{
      // Queue for retry when back online
      try{const q=JSON.parse(localStorage.getItem('mnn_report_queue')||'[]');q.push({body,t:Date.now()});localStorage.setItem('mnn_report_queue',JSON.stringify(q.slice(-20)))}catch(e){}
    });
  }catch(e){
    try{const q=JSON.parse(localStorage.getItem('mnn_report_queue')||'[]');q.push({body,t:Date.now()});localStorage.setItem('mnn_report_queue',JSON.stringify(q.slice(-20)))}catch(e){}
  }
}
// Retry queued reports on load
function flushReportQueue(){
  try{
    const q=JSON.parse(localStorage.getItem('mnn_report_queue')||'[]');
    if(!q.length)return;
    localStorage.setItem('mnn_report_queue','[]');
    q.forEach(item=>{try{fetch('/api/results',{method:'POST',headers:{'Content-Type':'application/json'},body:item.body}).catch(()=>{const rq=JSON.parse(localStorage.getItem('mnn_report_queue')||'[]');rq.push(item);localStorage.setItem('mnn_report_queue',JSON.stringify(rq.slice(-20)))})}catch(e){}});
  }catch(e){}
}

    const n4Items=[...allItems.vocab,...allItems.grammar,...allItems.kanji].filter(it=>{

        <div class="phase-rm-track">

      const packs=C.PACKS(), diag = packs.length
        ? `Диагностика: ${packs.length} пакет(ов) загружено, но ни у одного нет читаемого номера урока. Первая метка: "${(packs[0].lesson||packs[0].module||packs[0].lessonLabel||packs[0].moduleLabel||packs[0].title||'(нет)')}".`

      if(!have.has(n)) return `<div class="j-node locked" aria-label="Урок ${n} скоро будет">${n}<span class="cor">🔒</span></div>`;

      return `<div class="j-node ${done?'done':cur?'current':''}" onclick="C.haptic('light');App.openLesson(${n})">${n}`

    };

    const sections=[[25,35],[36,45],[46,50],[51,55],[56,60]];

  function reloadContent(){ C.haptic('light'); try{C.DB.set('cache_packs',[])}catch(e){} location.reload(); }

  function getMemStage(state){
    if(!state||!state.attempts) return {stage:'new',label:'Новое',pct:5,color:'var(--blue)'};
    const mastery=C.itemMastery(state._id||'');
    if(state.reps<=1) return {stage:'learning',label:'Изучение',pct:25,color:'var(--gold)'};
    if(state.reps<=3) return {stage:'young',label:'Молодое',pct:50,color:'#2e7d32'};
    if(mastery<80) return {stage:'young',label:'Растёт',pct:70,color:'#2e7d32'};
    return {stage:'mature',label:'Зрелое',pct:90,color:'var(--green)'};
  }

  /* ---------- generic quiz runner (mission recall, practice, reading Qs, listening) ---------- */
  let quiz=null;
  let quizGuard=false;
  function runQuiz(questions,title,onDone){
    C.startFlowSession();
    quiz={questions,i:0,combo:0,correct:0,onDone,title,sessionXP:0,_goalDoneShown:false,answers:new Array(questions.length).fill(null),_qStart:0,_perfectStreak:0,_sessionStart:Date.now()};
    showView('view-session');
    document.getElementById('s-meta').textContent='';
    document.getElementById('shead').classList.add('focus');
    document.getElementById('s-focus').classList.add('active');
    renderQ();
  }
  function renderQ(){
    if(quiz.i>=quiz.questions.length){return quiz.onDone(quiz)}
    const q=quiz.questions[quiz.i];
    quiz._qStart=Date.now();
    document.getElementById('s-fill').style.width=(quiz.i/quiz.questions.length*100)+'%';
    document.getElementById('s-meta').textContent=(quiz.i+1)+'/'+quiz.questions.length;
    const isListen=q.type==='listening';
    const diff=C.difficultyOf(q);
    // Memory strength bar for linked item
    const itemId=q.linksTo||q.id;
    const itemState=C.itemState(itemId);
    const stageInfo=getMemStage(itemState);
    let memBarHTML='';
    if(itemState.attempts>0){
      memBarHTML=`<div class="mem-bar"><span class="mb-label">記憶 Память</span><div class="mb-track"><div class="mb-fill" style="width:${stageInfo.pct}%;background:${stageInfo.color}"></div></div><span class="mb-stage ${stageInfo.stage}">${stageInfo.label}</span></div>`;
    }
    let html=`<div class="q-card" id="qc"><span class="diff-badge diff-${diff} q-diff"><span class="diff-dot"></span>${({easy:'Легко',medium:'Средне',hard:'Сложно'})[diff]||'Средне'}</span>`;
    if(isListen){ html+=`<div style="text-align:center;margin-bottom:14px"><button class="listen-btn" onclick="sayNow('${sayRef(q.audioText||'')}')">▶ 聞く Слушать</button></div>`; }
    html+=`<div class="q-sentence">${q.s||''}</div><div class="q-ask">${q.a||''}</div><div class="opts">`;
    q.o.forEach((o,idx)=>html+=`<button class="opt" id="o${idx}" onclick="App.answer(event,${idx})">${o}</button>`);
    html+=`</div><div id="fb"></div>${memBarHTML}<button class="next-btn" id="next" onclick="App.nextQ()">Далее →</button></div>`;
    document.getElementById('session-body').innerHTML=html;
    // Click guard: prevent accidental option selection for 300ms after render
    quizGuard=true;
    const optsEl=document.querySelector('#session-body .opts');
    if(optsEl) optsEl.classList.add('exam-click-guard');
    setTimeout(()=>{ quizGuard=false; if(optsEl) optsEl.classList.remove('exam-click-guard'); },300);
    if(isListen) setTimeout(()=>speak(q.audioText),350);
  }
  function answer(e,sel){
    if(quizGuard) return;
    const q=quiz.questions[quiz.i];const ok=sel===q.c;
    quiz.answers[quiz.i]=sel;
    const respTime=Date.now()-quiz._qStart;
    // Record flow state response
    C.recordFlowResponse(ok, respTime, C.difficultyOf(q), q.dim);
    q.o.forEach((_,idx)=>{const b=document.getElementById('o'+idx);b.disabled=true;if(idx===q.c)b.classList.add('correct');else if(idx===sel)b.classList.add('wrong')});
    // rate the linked item (unified SRS) — quality 4 correct, 1 wrong
    C.rate(q.linksTo||q.id, ok?4:1);
    // Track weak points and consecutive correct
    C.bumpConsecutiveCorrect(q.linksTo||q.id, ok);
    if(ok) C.clearWeak(q.linksTo||q.id); else C.logWrong(q.linksTo||q.id, q.dim, {lesson:q.lesson||q.module||null, type:q.type||null});
    const fb=document.getElementById('fb');
    if(ok){ C.haptic('success');quiz.correct++;quiz.combo++;
      // Sound
      SFX.correct();
      if(quiz.combo>=3) SFX.combo(quiz.combo);
      // XP with combo multiplier
      const mult=C.comboMultiplier(quiz.combo);
      let xpGain=Math.round(10*mult);
      // Flow-aware bonus (strategic, not just random)
      const bonus=C.flowBonus({combo:quiz.combo});
      if(bonus) xpGain+=bonus.amount;
      const xpResult=C.addXP(xpGain);
      quiz.sessionXP+=xpGain;
      showXpFloat(xpGain);
      // Daily goal progress
      C.progressDailyGoal(1);
      // Visual feedback
      fb.className='feedback ok';fb.innerHTML=`✓ ${(q.exp||'Правильно!')}${mult>1?` <span style="color:var(--gold);font-weight:900">×${mult}</span>`:''}`;
      particle(e,`+${xpGain} XP`,mult>1?'var(--gold)':'var(--green)');
      // Combo meter
      showCombo(quiz.combo,mult);
      // Bonus popup
      if(bonus) showBonus(bonus.amount,bonus.label);
      // Level up
      if(xpResult.leveledUp){ SFX.levelup(); confetti(); showAchievement('⬆️',`Уровень ${xpResult.level}!`,'Ты становишься сильнее!',3000); }
      // Daily goal completed
      if(C.isDailyGoalDone() && !quiz._goalDoneShown){ quiz._goalDoneShown=true; SFX.goalDone(); }
      if(quiz.combo>=3){particle(e,`🔥 ${quiz.combo} combo`,'var(--gold)');if(quiz.combo%3===0)C.haptic('heavy')}else particle(e,'+1','var(--green)');
    } else { C.haptic('error');quiz.combo=0;document.getElementById('qc').classList.add('shake');
      SFX.wrong();
      hideCombo();
      // Near-miss detection: was the wrong answer close?
      const nearMiss=C.isNearMiss(sel, q.c, q.o);
      const closePrefix=nearMiss?'<span style="color:var(--gold);font-weight:900">Почти! </span>':'';
      fb.className='feedback err';fb.innerHTML=`${closePrefix}✗ Ответ: <strong>${q.o[q.c]}</strong>. ${q.exp||''}`;
      if(nearMiss) C.haptic('light');
    }
    document.getElementById('next').classList.add('show');
  }
  function nextQ(){C.haptic('light');quiz.i++;renderQ()}

  /* ---------- PRODUCTION RECALL runner (recall from memory → reveal → self-grade) ----------
     This is the core retrieval upgrade: instead of picking the answer from 4 options
     (recognition), she must PRODUCE it from memory, then honestly grade how it felt
     (Again/Hard/Good/Easy). That graded signal is exactly what the Memory engine needs,
     and effortful recall builds far more durable memory than recognition. Used for
     vocab / grammar / kanji; reading & listening stay multiple-choice (comprehension). */
  let recall=null;
  function runRecall(cards,title,onDone,opts){
    C.startFlowSession();
    recall={cards,i:0,good:0,onDone,title,mode:(opts&&opts.mode)||'meaning',_qStart:0,_perfect:0,_sessionStart:Date.now(),_bestCombo:0,_combo:0};
    showView('view-session');
    document.getElementById('s-meta').textContent='';
    document.getElementById('shead').classList.add('focus');
    document.getElementById('s-focus').classList.add('active');
    renderRecall();
  }
  function recallMode(it){ return it._mode || recall.mode || 'meaning'; }
  function renderRecall(){
    if(recall.i>=recall.cards.length){return recall.onDone({n:recall.cards.length,good:recall.good})}
    const it=recall.cards[recall.i];
    recall._qStart=Date.now();
    document.getElementById('s-fill').style.width=(recall.i/recall.cards.length*100)+'%';
    document.getElementById('s-meta').textContent=(recall.i+1)+'/'+recall.cards.length;
    const reading = it.dim==='vocab' && recallMode(it)==='reading';
    const dimName = reading?'Чтение':({vocab:'Словарь',grammar:'Грамматика',kanji:'Кандзи'}[it.dim]||'Вспоминание');
    const cueLabel = reading            ? 'Вспомни чтение (кана)'
                   : it.dim==='grammar' ? "Вспомни значение и как образуется"
                   : it.dim==='kanji'   ? 'Вспомни чтение и значение'
                   :                      'Что это значит?';
    // JP first: show Japanese, recall the meaning/translation
    const cue = reading ? it.word : it.dim==='grammar' ? it.point : it.dim==='kanji' ? it.char : it.word;
    const diff=C.difficultyOf(it);
    // Memory strength bar
    const itemState=C.itemState(it.id);
    const stageInfo=getMemStage(itemState);
    let memBarHTML='';
    if(itemState.attempts>0){
      memBarHTML=`<div class="mem-bar"><span class="mb-label">記憶 Память</span><div class="mb-track"><div class="mb-fill" style="width:${stageInfo.pct}%;background:${stageInfo.color}"></div></div><span class="mb-stage ${stageInfo.stage}">${stageInfo.label}</span></div>`;
    }
    document.getElementById('session-body').innerHTML=`
      <div class="recall-eyebrow">🧠 ${dimName} · воспроизведи по памяти</div>
      <div class="q-card" id="rc"><span class="diff-badge diff-${diff} q-diff"><span class="diff-dot"></span>${({easy:'Легко',medium:'Средне',hard:'Сложно'})[diff]||'Средне'}</span>
        <div class="recall-cuelabel">${cueLabel}</div>
        <div class="recall-cue">${cue}</div>
        <div class="recall-direction">日本語 → Значение</div>
        <div id="recall-answer" class="recall-answer" style="display:none"></div>
        <button class="reveal-btn" id="reveal-btn" onclick="App.revealRecall()">Показать ответ</button>
        <div id="recall-grade" class="rate-row" style="display:none">
          <button class="rate r1" onclick="App.gradeRecall(1)">Снова</button>
          <button class="rate r2" onclick="App.gradeRecall(2)">Трудно</button>
          <button class="rate r3" onclick="App.gradeRecall(3)">Хорошо</button>
          <button class="rate r4" onclick="App.gradeRecall(4)">Легко</button>
        </div>
        ${memBarHTML}
      </div>`;
  }
  function revealRecall(){
    C.haptic('light');
    SFX.flip();
    const it=recall.cards[recall.i];
    const reading = it.dim==='vocab' && recallMode(it)==='reading';
    let html, say;
    if(it.dim==='vocab'){
      say=it.example||it.word;
      html = reading
        ? `<div class="recall-main">${it.reading||''}</div><div class="recall-reading">${it.word} · ${it.meaning||''}</div>
           <div class="recall-ex">${it.example||''}</div><div class="recall-exm">${it.exampleMeaning||''}</div>`
        : `<div class="recall-main">${it.meaning||''}</div><div class="recall-reading">${it.word} · ${it.reading||''}</div>
           <div class="recall-ex">${it.example||''}</div><div class="recall-exm">${it.exampleMeaning||''}</div>`;
    } else if(it.dim==='kanji'){
      say=it.exampleWord||it.char;
      html=`<div class="recall-main">${it.meaning||''}</div><div class="recall-reading">${it.char} · ${it.reading||''}</div>
        <div class="recall-ex">${it.exampleWord||''}</div>`;
    } else {
      say=it.listening||(it.examples&&it.examples[0])||it.point;
      html=`<div class="fc-grammar-back" style="margin-bottom:10px">${it.explanation||''}</div>
        <ul class="recall-eglist">${(it.examples||[]).map(x=>`<li>${x}</li>`).join('')}</ul>`;
    }
    html+=`<button class="listen-btn" onclick="sayNow('${sayRef(say)}')">▶ 聞く Слушать</button>`;
    const a=document.getElementById('recall-answer'); a.innerHTML=html; a.style.display='block';
    document.getElementById('reveal-btn').style.display='none';
    document.getElementById('recall-grade').style.display='grid';
  }
  function gradeRecall(g){
    C.haptic(g>=3?'success':'error');
    const it=recall.cards[recall.i];
    const respTime=Date.now()-recall._qStart;
    C.recordFlowResponse(g>=3, respTime, C.difficultyOf(it), it.dim);
    if(it._drillId) C.rateDrill(it._drillId,g); else C.rate(it.id,g);
    // Weak-point tracking
    C.bumpConsecutiveCorrect(it.id, g>=3);
    if(g>=3) C.clearWeak(it.id); else C.logWrong(it.id, it.dim, {lesson:it.lesson||it.module||null, type:it._mode||null});
    if(g>=3){
      recall.good++;
      recall._combo++;
      if(recall._combo>recall._bestCombo) recall._bestCombo=recall._combo;
      SFX.correct();
      // XP for recall (more for easy, less for hard)
      const xpGain=g===4?15:g===3?10:5;
      const xpResult=C.addXP(xpGain);
      C.progressDailyGoal(1);
      if(xpResult.leveledUp){ SFX.levelup(); confetti(); showAchievement('⬆️',`Уровень ${xpResult.level}!`,'Ты становишься сильнее!',3000); }
    } else {
      recall._combo=0;
      SFX.wrong();
    }
    recall.i++; renderRecall();
  }

  /* ---------- LESSON DETAIL (teach first, then practice) ---------- */
  let curLesson=null, curTab='learn';

  function lessonItems(n,dim){
    const p=C.getLessonByNum(n); if(!p) return [];
    const src = dim==='vocab'?p.vocabulary : dim==='grammar'?p.grammar : dim==='kanji'?p.kanji : [];
    return (src||[]).map(x=>C.BY_ID[x.id]).filter(Boolean);
  }
  function lessonQuestions(n,filter){
    const p=C.getLessonByNum(n); if(!p) return [];
    return C.ITEMS.question.filter(q=>q.module===p.module && (!filter||filter(q)));
  }
  function lessonListening(n){ return lessonQuestions(n,q=>q.type==='listening'); }

  function openLesson(n){
    curLesson=n; curTab='learn';
    const p=C.getLessonByNum(n); if(!p) return;
    renderLessonHead(n);
    document.getElementById('seg-learn').classList.add('active');
    document.getElementById('seg-practice').classList.remove('active');
    showView('view-lesson');
    renderLessonTab();
  }
  function renderLessonHead(n){
    const p=C.getLessonByNum(n);

      <div class="lh-top"><button class="lh-back" onclick="App.home()">←</button>

  }
  function lessonTab(t){
    curTab=t; C.haptic('light');
    document.getElementById('seg-learn').classList.toggle('active',t==='learn');
    document.getElementById('seg-practice').classList.toggle('active',t==='practice');
    renderLessonTab();
  }
  function renderLessonTab(){ curTab==='learn'?renderLearn():renderPractice(); scrollTo(0,0); }

  function renderLearn(){
    const n=curLesson, p=C.getLessonByNum(n), g=(p.grammar||[]);
    const about = g.length ? `<div class="lesson-about"><h4>Что изучает этот урок</h4>${g.map(x=>`<div style="margin-bottom:8px"><strong>${x.point}</strong><br>${x.explanation||''}</div>`).join('')}</div>` : '';
    const vocabBlock = (p.vocabulary&&p.vocabulary.length) ? `
      <div class="learn-block">
        <div class="lb-h"><span>🧠 Словарь · ${p.vocabulary.length}</span>${diffBadge(p.difficulty)}</div>
        ${p.vocabulary.map(v=>`<div class="vocab-row"><div style="flex:1">
            <span class="vocab-jp">${v.word}</span> <span class="vocab-rd">${v.reading||''}</span>
            <div class="vocab-mn">${v.meaning||''}</div>
            ${v.example?`<div class="vocab-ex">${v.example}${v.exampleMeaning?` — <span style="color:var(--ink3)">${v.exampleMeaning}</span>`:''}</div>`:''}
          </div><div style="display:flex;gap:4px"><button class="mini-listen" onclick="sayNow('${sayRef(v.example||v.word)}')">▶</button>${window.SpeechRecognition||window.webkitSpeechRecognition?`<button class="mini-listen" style="background:var(--green-soft);color:var(--green)" onclick="checkPronunciation('${sayRef(v.word)}',this)">🎤</button>`:''}</div></div>`).join('')}
      </div>` : '';
    const gramBlock = g.length ? `
      <div class="learn-block">
        <div class="lb-h"><span>✍ Грамматика · ${g.length}</span></div>
        ${g.map(x=>`<div class="gram-card">
          <div class="gram-point">${x.point}</div>
          <div class="gram-exp">${x.explanation||''}</div>
          ${(x.examples||[]).map(ex=>`<div class="gram-ex">${ex}</div>`).join('')}

        <div class="passage" style="margin:0 0 12px;box-shadow:none">${p.reading.passage||''}</div>
        <button class="listen-btn" onclick="sayNow('${sayRef(p.reading.passage||'')}')">🎧 Читать с аудированием</button>
      </div>` : '';
    document.getElementById('lesson-content').innerHTML=`
      <div class="lookup-hint">💡 Долгое нажатие на японский текст ниже — выбери его, затем нажми <strong>Поиск</strong> для чтения и значения. Нажми ▶ чтобы услышать.</div>

  function markLearned(n){
    C.haptic('success');
    C.markLessonStep(n,'vocab'); C.markLessonStep(n,'grammar');

  function renderPractice(){
    const n=curLesson, p=C.getLessonByNum(n), prog=C.getLessonProgress(n), has=a=>a&&a.length;
    const cats=[];
    if(has(p.vocabulary)) cats.push({icon:'🧠',name:'Словарь — вспоминание',sub:`${p.vocabulary.length} слов · значение → воспроизведи слово`,fn:`App.practiceVocab(${n})`,diff:p.difficulty});
    if(has(p.vocabulary)) cats.push({icon:'🔤',name:'Тренировка чтения',sub:'Видишь слово → произнеси кану',fn:`App.practiceReadingDrill(${n})`,diff:'easy'});
    if(has(p.grammar))    cats.push({icon:'✍',name:'Грамматика',sub:`${p.grammar.length} пункт${p.grammar.length>1?'ов':'а'} · вспомни значение и форму`,fn:`App.practiceGrammar(${n})`,diff:p.difficulty});
    if(has(p.kanji))      cats.push({icon:'🈶',name:'Кандзи',sub:`${p.kanji.length} иероглиф${p.kanji.length>1?'ов':'а'}`,fn:`App.practiceKanji(${n})`,diff:'hard'});
    if(lessonListening(n).length) cats.push({icon:'🎧',name:'Аудирование',sub:`${lessonListening(n).length} вопрос${lessonListening(n).length>1?'ов':'а'}`,fn:`App.practiceListening(${n})`,diff:'medium'});
    if(p.reading)         cats.push({icon:'📖',name:'Чтение и понимание',sub:`${prog.steps.includes('reading')?'✓ готово · ':''}Текст + вопросы`,fn:`App.practiceReading(${n})`,diff:p.difficulty});

    let html=`<div style="font-size:13px;color:var(--ink3);font-weight:700;margin-bottom:10px">Разминка любым упражнением — у каждого указана сложность. Затем заверши двумя проверками ниже.</div>`;
    html+=cats.map(c=>`<div class="prac-card" onclick="C.haptic('light');${c.fn}">
        <div class="prac-icon">${c.icon}</div>
        <div class="prac-body"><div class="prac-name">${c.name}</div><div class="prac-sub">${c.sub}</div></div>
        ${diffBadge(c.diff)}<div class="prac-arrow">→</div></div>`).join('');
    html+=`<div class="sect" style="margin-top:1.4rem">仕上げ — Заверши урок</div>`;
    html+=`<button class="lcta${prog.steps.includes('quiz')?' ghost':''}" onclick="C.haptic('heavy');App.practiceMixed(${n})">${prog.steps.includes('quiz')?'✓ ':''}Смешанный тест — проверка узнавания</button>`;
    html+=`<button class="lcta${prog.steps.includes('write')?' ghost':''}" onclick="C.haptic('heavy');App.practiceWrite(${n})">${prog.steps.includes('write')?'✓ ':''}Проверка воспроизведения — вспомни всё</button>`;

  // ---- practice runners (warm-ups; feed the spaced-repetition engine, no step gate) ----
  function backToLesson(n){ renderLessonHead(n); curTab='practice';
    document.getElementById('seg-learn').classList.remove('active');
    document.getElementById('seg-practice').classList.add('active');
    showView('view-lesson'); renderPractice(); }
  function afterDrill(n,rstat){ C.logActivity((rstat&&rstat.n)||1,1); C.snapshotToday(); C.bumpMomentum(6);
    if(rstat&&rstat.n) report('drill',{lesson:n,good:rstat.good,total:rstat.n,overall:C.overallMastery(),momentum:C.getMomentum().value});
    if(rstat&&rstat.n&&rstat.good>=Math.ceil(rstat.n*0.7)) confetti(); backToLesson(n); }

  function practiceVocab(n){ const c=C.shuffle(lessonItems(n,'vocab')).map(it=>({...it,_mode:'meaning'})); if(!c.length)return; runRecall(c,'Словарь',r=>afterDrill(n,r),{mode:'meaning'}); }
  function practiceReadingDrill(n){ const c=C.shuffle(lessonItems(n,'vocab')).map(it=>({...it,_mode:'reading'})); if(!c.length)return; runRecall(c,'Чтение',r=>afterDrill(n,r),{mode:'reading'}); }
  function practiceGrammar(n){ const c=C.shuffle(lessonItems(n,'grammar')).map(it=>({...it,_mode:'meaning'})); if(!c.length)return; runRecall(c,'Грамматика',r=>afterDrill(n,r)); }
  function practiceKanji(n){ const c=C.shuffle(lessonItems(n,'kanji')).map(it=>({...it,_mode:'meaning'})); if(!c.length)return; runRecall(c,'Кандзи',r=>afterDrill(n,r)); }

  function practiceListening(n){
    const qs=C.shuffle(lessonListening(n)); if(!qs.length)return;
    runQuiz(qs,'Аудирование',q=>{ C.logActivity(q.questions.length,2);C.snapshotToday();C.bumpMomentum(6);
      report('listening',{lesson:n,correct:q.correct,total:q.questions.length,overall:C.overallMastery(),momentum:C.getMomentum().value});
      if(q.correct/q.questions.length>=.8)confetti(); backToLesson(n); });
  }
  function practiceReading(n){
    const s=C.getLessonByNum(n).reading; if(!s)return;
    showView('view-session');
    document.getElementById('s-meta').textContent='Чтение'; document.getElementById('s-fill').style.width='30%';
    document.getElementById('session-body').innerHTML=`
      <div class="lookup-hint">💡 Долгое нажатие на слово для поиска.</div>
      <div style="font-family:'Noto Sans JP';font-size:18px;font-weight:800;margin-bottom:10px">${s.title||''}</div>
      <div class="passage">${s.passage||''}</div>
      <div class="read-tools"><button class="rt-listen" onclick="sayNow('${sayRef(s.passage||'')}')">🎧 Слушать</button><button class="rt-start" onclick="App.lessonReadingQuiz(${n})">Вопросы →</button></div>`;
  }
  function lessonReadingQuiz(n){
    const s=C.getLessonByNum(n).reading;
    const qs=(s.questions||[]).map(rq=>({id:rq.id,s:rq.q,a:'読解 — понимание',o:rq.o,c:rq.c,exp:rq.exp,dim:'reading',type:'comprehension',module:'L'+n,lesson:'L'+n}));
    if(!qs.length){ C.markLessonStep(n,'reading'); renderLessonHead(n); return backToLesson(n); }
    runQuiz(qs,'Чтение',q=>{ C.markLessonStep(n,'reading'); C.logActivity(q.questions.length,3);C.snapshotToday();C.bumpMomentum(8);
      report('reading',{lesson:n,correct:q.correct,total:q.questions.length,overall:C.overallMastery(),momentum:C.getMomentum().value});
      if(q.correct/q.questions.length>=.8)confetti(); backToLesson(n); });
  }

  // ---- the two graded "checks" that advance the lesson toward completion ----
  function practiceMixed(n){
    let qs=C.shuffle(lessonQuestions(n)).slice(0,8);
    qs=[...qs,...C.getPrevLessonQuestions(n,2)];
    if(!qs.length){ C.markLessonStep(n,'quiz'); renderLessonHead(n); return backToLesson(n); }
    runQuiz(qs,'Тест',q=>{ C.markLessonStep(n,'quiz'); C.logActivity(q.questions.length,3);C.snapshotToday();const mom=C.bumpMomentum(10);
      report('lesson-quiz',{lesson:n,correct:q.correct,total:q.questions.length,overall:C.overallMastery(),momentum:mom});
      const wrongQs=q.questions.filter((qq,i)=>q.answers[i]!==qq.c);
      showRewardScreen({icon:q.correct/q.questions.length>=.8?'🎉':'📝',title:'Тест готов!',sub:`Урок ${n} · ${q.correct}/${q.questions.length} правильно`,xp:q.sessionXP||q.correct*10,correct:q.correct,total:q.questions.length,celebrate:q.correct/q.questions.length>=.8,action:`App.backToLesson(${n})`,actionLabel:'К уроку →'});
      if(wrongQs.length) setTimeout(()=>{
        const rb=document.querySelector('.reward-actions');
        if(rb) rb.insertAdjacentHTML('beforeend',`<button class="mistakes-btn" onclick="App.reviewMistakes(${JSON.stringify(wrongQs.map(w=>w.id)).replace(/"/g,'&quot;')})">Разобрать ${wrongQs.length} ошибок →</button>`);
      },200);
    });
  }
  function practiceWrite(n){
    const cards=C.shuffle([...lessonItems(n,'vocab'),...lessonItems(n,'grammar'),...lessonItems(n,'kanji')]).map(it=>({...it,_mode:'meaning'}));
    if(!cards.length){ C.markLessonStep(n,'write'); renderLessonHead(n); return backToLesson(n); }
    runRecall(cards,'Воспроизведение',r=>{ C.markLessonStep(n,'write'); C.logActivity(r.n,3);C.snapshotToday();const mom=C.bumpMomentum(12);
      report('lesson-write',{lesson:n,good:r.good,total:r.n,overall:C.overallMastery(),momentum:mom});
      const complete=C.isLessonComplete(n);
      showRewardScreen({icon:complete?'🎉':'✍️',title:complete?`Урок ${n} завершён!`:'Воспроизведение готово!',sub:`${r.good}/${r.n} вспомнено${complete?' · карточки добавлены в повторение':''}`,xp:r.good*15,correct:r.good,total:r.n,celebrate:true,action:`App.backToLesson(${n})`,actionLabel:'К уроку →'});
    });
  }

  /* ---------- DAILY REVIEW (spaced repetition across completed lessons) ---------- */
  function startReview(){
    const due=C.getDrillDue(20);
    if(!due.length){ return home(); }
    const cards=due.map(dc=>{ const dim = dc.type==='grammar'?'grammar' : dc.type==='kanji'?'kanji' : 'vocab';
      return Object.assign({}, dc.item, { dim, _drillId:dc.id, _mode: dc.type==='vocab-jpen'?'reading':'meaning' }); });
    runRecall(cards,'Ежедневное повторение',r=>{ C.logActivity(r.n,Math.max(1,Math.round(r.n/4)));C.snapshotToday();const mom=C.bumpMomentum(8);
      report('review',{good:r.good,total:r.n,overall:C.overallMastery(),momentum:mom});
      showRewardScreen({icon:'🔁',title:'Повторение готово!',sub:`${r.good}/${r.n} закреплено · Импульс ${mom}`,xp:r.good*12,correct:r.good,total:r.n,celebrate:r.good>=Math.ceil(r.n*0.7)});
    });
  }

  /* ---------- GLOBAL practice (works across ALL lessons, no completion gate) ---------- */
  function allStudyCards(){ return [...C.ITEMS.vocab,...C.ITEMS.grammar,...C.ITEMS.kanji]; }
  function startGlobalReview(){
    curLesson=null;
    const all=allStudyCards();
    if(!all.length) return home();
    const dueAttempted=all.filter(it=>C.itemState(it.id).attempts>0 && C.isDue(it.id));
    const dueNew=all.filter(it=>C.itemState(it.id).attempts===0);
    let cards=[...dueAttempted, ...C.shuffle(dueNew)].slice(0,25);
    if(!cards.length) cards=C.shuffle(all).slice(0,20);   // nothing strictly due → quick mixed session
    cards=cards.map(c=>({...c,_mode:'meaning'}));
    runRecall(C.shuffle(cards),'Повторение',r=>{ C.logActivity(r.n,Math.max(1,Math.round(r.n/4)));C.snapshotToday();const mom=C.bumpMomentum(8);
      report('review',{good:r.good,total:r.n,overall:C.overallMastery(),momentum:mom});
      showRewardScreen({icon:'🔁',title:'Повторение готово!',sub:`${r.good}/${r.n} закреплено · Импульс ${mom}`,xp:r.good*12,correct:r.good,total:r.n,celebrate:r.good>=Math.ceil(r.n*0.7)});
    });
  }
  let _fhFilter='all';
  let _fhLevel='all';
  let _fhLesson='all';
  function startFlashcards(){
    curLesson=null;
    showView('view-flashhub');
    renderFlashHub();
  }
  function setFhFilter(v){_fhFilter=v;renderFlashHub();}
  function setFhLevel(v){_fhLevel=v;_fhLesson='all';renderFlashHub();}
  function setFhLesson(v){_fhLesson=v;renderFlashHub();}
  function _fhLevelClass(lv){return lv==='N5'?'n5':lv==='N4'?'n4':lv==='N3'?'n3':'';}
  function renderFlashHub(){
    const body=document.getElementById('flashhub-body');
    const vocab=C.ITEMS.vocab||[];
    const kanji=C.ITEMS.kanji||[];
    const grammar=C.ITEMS.grammar||[];
    const srs=C.getSRS();

    const allFlat=[...vocab,...kanji,...grammar];
    const lessons=[...new Set(allFlat.map(it=>it.lessonNum).filter(Boolean))].sort((a,b)=>a-b);
    const levels=['N5','N4','N3'].filter(lv=>allFlat.some(it=>it.level===lv));

    function filterItems(arr){
      let r=arr;
      if(_fhFilter==='vocab')r=r.filter(it=>it.dim==='vocab');
      else if(_fhFilter==='kanji')r=r.filter(it=>it.dim==='kanji');
      else if(_fhFilter==='grammar')r=r.filter(it=>it.dim==='grammar');
      if(_fhLevel&&_fhLevel!=='all') r=r.filter(it=>it.level===_fhLevel);

    // Active filter label
    let filterDesc='Все уровни · Все уроки';

    body.innerHTML=`

      <div style="font-size:13px;font-weight:800;color:var(--ink3);margin:8px 0 4px;padding:0 4px">🃏 Колоды флешкарт</div>
      ${_fhFilter==='all'||_fhFilter==='vocab'?`
        <div class="fh-section">
          <div class="fh-section-head"><span class="fh-section-title">📖 Словарь</span><span class="fh-section-count">${vLearned}/${vCount} изучено</span></div>
          <div style="font-size:11px;color:var(--ink3);margin-bottom:6px">Японский → Значение · вспомни по памяти</div>

  function startFlashDeck(dim){
    let items;
    const srs=C.getSRS();
    let pool=C.ITEMS[dim]||[];
    // Apply level filter
    if(_fhLevel&&_fhLevel!=='all') pool=pool.filter(it=>it.level===_fhLevel);
    // Apply lesson filter
    if(_fhLesson&&_fhLesson!=='all'){ const ln=parseInt(_fhLesson.slice(1)); pool=pool.filter(it=>it.lessonNum===ln); }
    items=pool;
    if(!items.length)return;
    // Sort: unlearned first, then shuffle within
    const unlearned=items.filter(it=>{const st=srs[it.id];return !st||st.reps===0});
    const learned=items.filter(it=>{const st=srs[it.id];return st&&st.reps>0});
    const cards=[...C.shuffle(unlearned),...C.shuffle(learned)].slice(0,30).map(c=>({...c,_mode:'meaning',_dim:dim}));
    const titles={vocab:'Флешкарты — Словарь',kanji:'Флешкарты — Кандзи',grammar:'Флешкарты — Грамматика'};
    runRecall(cards,titles[dim]||'Флешкарты',r=>{
      C.logActivity(r.n,Math.max(1,Math.round(r.n/4)));C.snapshotToday();C.bumpMomentum(6);
      report('flashcards',{good:r.good,total:r.n,overall:C.overallMastery(),momentum:C.getMomentum().value});
      showRewardScreen({icon:'🃏',title:'Флешкарты готовы!',sub:`${r.good}/${r.n} известно · отличная работа`,xp:r.good*8,correct:r.good,total:r.n,celebrate:r.good>=Math.ceil(r.n*0.7)});
    });
  }
  function reviewMistakes(ids){
    if(!ids||!ids.length) return home();
    const items=ids.map(id=>C.BY_ID[id]).filter(Boolean);
    if(!items.length) return home();
    runQuiz(items.map(it=>{
      const correctAns=it.word||it.reading||it.point||'';
      const distractors=(C.ITEMS[it.dim]||[]).filter(x=>x.id!==it.id).slice(0,3).map(x=>x.word||x.reading||x.point||'').filter(v=>v&&v!==correctAns);
      const o=C.shuffle([correctAns,...distractors]).slice(0,4);
      return {
        id:it.id,linksTo:it.id,s:it.example||it.word||it.point||'',a:it.dim==='grammar'?'Грамматика':'Словарь',
        o, c:o.indexOf(correctAns), exp:it.meaning||it.pointEn||'', dim:it.dim, type:'mcq', module:it.module||'', lesson:it.lesson||''
      };
    }),'Повторение ошибок',q=>{ C.logActivity(q.questions.length,2);C.snapshotToday();C.bumpMomentum(5);
      report('mistakes',{correct:q.correct,total:q.questions.length,overall:C.overallMastery(),momentum:C.getMomentum().value});
      showRewardScreen({icon:'✅',title:'Ошибки разобраны!',sub:`${q.correct}/${q.questions.length} теперь правильно`,xp:q.correct*12,correct:q.correct,total:q.questions.length,celebrate:q.correct===q.questions.length});
    });
  }
  function exitSession(){C.haptic('light');try{speechSynthesis.cancel()}catch(e){}
    hideCombo();

  /* ===================== REWARD SCREEN ===================== */
  function showRewardScreen(opts){
    hideCombo();
    const xp=opts.xp||0;
    const correct=opts.correct||0;
    const total=opts.total||0;
    const accuracy=total?Math.round(correct/total*100):0;
    const lp=C.levelProgress();
    const badges=C.checkBadges();
    const dueTomorrow=C.getCappedDue().length;
    const mom=C.getMomentum().value;
    const streakData=C.getStreakData();

    // Track perfect sessions (10+ items, 100% accuracy)
    if(total>=10 && correct===total) C.DB.set('perfect_session',true);
    // Track speed demon (20+ items in under 3 min = 180000ms)
    const sq=quiz&&quiz._sessionStart;
    const sr=recall&&recall._sessionStart;
    const sessionStart=sr||sq;
    if(total>=20 && sessionStart && (Date.now()-sessionStart)<180000) C.DB.set('speed_demon',true);

    // Sound
    if(opts.celebrate) confetti();
    SFX.whoosh();

    let html=`<div class="reward-screen">
      <div class="reward-icon">${opts.icon||'🎉'}</div>
      <div class="reward-title">${opts.title||'Сессия завершена!'}</div>
      <div class="reward-sub">${opts.sub||''}</div>
      <div class="reward-accuracy-ring">
        <svg width="100" height="100"><circle class="ra-bg" cx="50" cy="50" r="42"/><circle class="ra-fg" id="ra-ring" cx="50" cy="50" r="42" stroke-dasharray="263.9" stroke-dashoffset="263.9" stroke="${accuracy>=80?'#69f0ae':accuracy>=50?'#ffd84d':'#ff4b4b'}"/></svg>
        <div class="ra-val"><div class="ra-num" id="ra-num">0</div><div class="ra-lab">Точность</div></div>
      </div>
      <div class="reward-xp"><span class="rxp-label">XP получено</span><span class="count-up" id="rxp-num">0</span></div>
      ${accuracy===100?'<div class="reward-perfect">✨ Идеальная сессия! ✨</div>':''}
      <div class="reward-stats">
        <div class="reward-stat"><div class="rs-v count-up" id="rs-correct">0</div><div class="rs-l">Правильно</div></div>
        <div class="reward-stat"><div class="rs-v count-up" id="rs-mom">0</div><div class="rs-l">Импульс</div></div>
        <div class="reward-stat"><div class="rs-v" id="rs-combo">0</div><div class="rs-l">Лучшая серия</div></div>
      </div>`;
    // Level up
    if(opts.leveledUp){
      html+=`<div class="reward-levelup"><div class="rlu-lv">Уровень ${lp.level}</div><div class="rlu-msg">Новый уровень! 🎉</div></div>`;
      SFX.levelup();
    }
    // New badges
    if(badges.newly && badges.newly.length){
      html+=`<div class="reward-badges">`;
      badges.newly.forEach(b=>{
        html+=`<div class="reward-badge"><div class="rb-icon">${b.icon}</div><div class="rb-title">${b.title}</div><div class="rb-desc">${b.desc}</div></div>`;
      });
      html+=`</div>`;
      SFX.badge();
    }
    // Tomorrow teaser + curiosity gap
    const teaser=C.curiosityTeaser();
    const inv=C.totalInvestment();
    html+=`<div class="reward-tomorrow">📅 Завтра: ${dueTomorrow} повторений ждёт</div>`;
    // Curiosity gap — creates an open loop the brain wants to close
    html+=`<div class="reward-teaser">🔮 ${teaser}</div>`;
    // Sunk-cost / investment — makes quitting feel like throwing away progress
    if(inv.totalReviews>0){
      html+=`<div class="reward-investment-card">
        <div class="ric-title">📊 Твои вложения</div>
        <div class="ric-stats">
          <div class="ric-stat"><div class="ric-v">${inv.totalReviews}</div><div class="ric-l">Повторений</div></div>
          <div class="ric-stat"><div class="ric-v">${C.overallMastery()}%</div><div class="ric-l">Освоение</div></div>
          <div class="ric-stat"><div class="ric-v">${streakData.count}</div><div class="ric-l">Дней подряд</div></div>
        </div>
      </div>`;
      html+=`<div class="reward-investment">Ты повторила ${inv.totalReviews} раз. Каждое повторение создало нейронную связь. Не дай им угаснуть.</div>`;
    }
    // Actions — seamless continuation: "Just one more" + home
    const dueNow=C.getCappedDue().length;
    html+=`<div class="reward-actions">
      <button class="lcta ghost" onclick="App.home()">← Главная</button>
      ${dueNow>0?`<button class="lcta" onclick="App.startReview()">Продолжить (${dueNow} повторений) →</button>`:''}
      ${opts.action?`<button class="lcta" onclick="${opts.action}">${opts.actionLabel||'Продолжить →'}</button>`:''}
    </div></div>`;
    document.getElementById('results-body').innerHTML=html;
    showView('view-results');
    // Animate count-ups + accuracy ring
    const ringCirc=263.9;
    setTimeout(()=>{
      countUp(document.getElementById('rxp-num'),xp);
      countUp(document.getElementById('rs-correct'),correct);
      countUp(document.getElementById('rs-mom'),Math.round(mom));
      countUp(document.getElementById('ra-num'),accuracy,'%');
      // Animate accuracy ring
      const ringEl=document.getElementById('ra-ring');
      if(ringEl) ringEl.style.strokeDashoffset=ringCirc-(ringCirc*accuracy/100);
      // Best combo
      const comboEl=document.getElementById('rs-combo');
      if(comboEl) comboEl.textContent=(quiz?quiz.combo:0)||(recall&&recall._bestCombo?recall._bestCombo:0);
    },100);
  }

  /* ===================== EXAM COUNTDOWN ===================== */
  const EXAM_DEFAULT_DATE='2027-06-15';   // Пробный тест · mid-June (editable)

  function examDaysLeft(){

    const cur=examDate();

    const overlay=document.createElement('div');
    overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;display:flex;align-items:center;justify-content:center';
    const modal=document.createElement('div');
    modal.style.cssText='background:var(--card);border-radius:20px;padding:24px;max-width:340px;width:90%;box-shadow:0 8px 32px rgba(0,0,0,.2)';

      <div style="display:flex;gap:10px">

        <button id="exam-date-save" style="flex:1;padding:12px;border:none;border-radius:12px;background:var(--blue);color:#fff;font-weight:800;cursor:pointer">Сохранить</button>
      </div>`;
    overlay.appendChild(modal);

    const input=document.getElementById('exam-date-input');

    document.getElementById('exam-date-cancel').onclick=()=>overlay.remove();
