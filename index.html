  /* ===================== MOCK TEST (A→B→C) ===================== */
  const LEVELS={
    A:{diff:'easy',  jp:'初級', en:'Начальный',  color:'#2bb673'},
    B:{diff:'medium',jp:'中級', en:'Средний',     color:'#e69500'},
    C:{diff:'hard',  jp:'上級', en:'Продвинутый', color:'#e53935'}
  };
  // Real MEXT Japanese exam: ~60 min for ~30 questions = 2 min/question
  // Our test: ~23 questions, scaled to ~75% of real per-question time
  const EXAM_TIME={A:25*60, B:30*60, C:35*60};   // practice exam minutes per level
  const PASS_PCT=60;
  let EX=null, examTimer=null;

  function examStatus(level){ return { best:C.DB.get('exam_best_'+level)||0, passed:!!C.DB.get('exam_pass_'+level) }; }
  function examUnlocked(level){ return level==='A' || (level==='B'&&examStatus('A').passed) || (level==='C'&&examStatus('B').passed); }

  function openExamHub(){
    clearInterval(examTimer); EX=null;
    document.getElementById('exam-top').classList.remove('show');
    const card=(lvl)=>{
      const L=LEVELS[lvl], st=examStatus(lvl), unlocked=examUnlocked(lvl);
      const meta = unlocked
        ? `<div class="lv-best">${st.best?st.best+'%':'—'}</div><div class="lv-status ${st.passed?'lv-pass':''}">${st.passed?'✓ сдан':'лучший результат'}</div>`
        : `<div class="lv-status lv-lock">🔒 ${lvl==='B'?'сдай A':'сдай B'}</div>`;
      return `<button class="level-card lv-${lvl} ${unlocked?'':'locked'}" ${unlocked?`onclick="C.haptic('heavy');App.startExam('${lvl}')"`:'disabled'}>
        <div class="lv-row">
          <div class="lv-badge">${lvl}</div>
          <div><div class="lv-name">${L.jp} · ${L.en}</div><div class="lv-jp">Задание ${lvl} · ${EXAM_TIME[lvl]/60} мин · 5 секций</div></div>
          <div class="lv-meta">${meta}</div>
        </div>
        <div class="lv-secs">I 文法 · II 語彙 · III 漢字語彙 · IV 漢字(読み書き) · V 読解</div>
      </button>`;
    };
    document.getElementById('exam-body').innerHTML=`
      <button class="sback" style="margin-bottom:1rem" onclick="App.home()">← Главная</button>
      <div class="exam-hub-head">
        <div class="exam-hub-title">📝 Пробные тесты</div>
        <div class="exam-hub-sub">Проверь свои знания в формате экзамена. Начни с <b>A 初級</b>; сдав (≥${PASS_PCT}%), откроешь следующий уровень. Каждый тест с таймером и пятью секциями. Вопросы берутся из твоих уроков по сложности.</div>
      </div>
      ${card('A')}${card('B')}${card('C')}`;
    showView('view-exam');
  }

  function hasKanji(s){ return /[\u4e00-\u9faf]/.test(s||''); }

  function buildExam(level){
    const L=LEVELS[level], diff=L.diff, sh=C.shuffle;
    // Map exam difficulty to JLPT levels for bank filtering
    const diffToLevels={easy:['N5','N4'], medium:['N3','N2'], hard:['N1']};
    const bankLevels=diffToLevels[diff]||[];
    const bankQs=(window.JLPT_BANK||[]).filter(q=>bankLevels.includes(q.level));
    const qPool=[...C.ITEMS.question.filter(q=>q.type!=='listening'&&q.type!=='comprehension'), ...bankQs];
    const pick=(dim,n)=>{ let p=sh(qPool.filter(q=>q.dim===dim&&C.difficultyOf(q)===diff));
      if(p.length<n) p=p.concat(sh(qPool.filter(q=>q.dim===dim&&C.difficultyOf(q)!==diff)));
      return p.slice(0,n); };
    const screens=[]; const sec=[];
    const addSec=(key,label,desc,items,pts,passage,ptitle,passageAll)=>{
      if(!items.length) return;
      sec.push({key,label,pts:0,poss:0});
      items.forEach((it,idx)=>{
        const showP=passageAll||idx===0;
        screens.push({
        section:key, secLabel:label, secDesc:desc, secFirst:idx===0,
        q:it.q, o:it.o, c:it.c, exp:it.exp, pts,
        passage:showP?passage:null, passageTitle:showP?ptitle:null
      })});
    };
    // I 文法 (grammar MCQ) · II 語彙 (vocab MCQ) · III 漢字語彙 (kanji MCQ)
    addSec('I','文法 Грамматика','Выбери наиболее подходящий вариант для каждого пропуска.',
      pick('grammar',6).map(q=>({q:q.s,o:q.o,c:q.c,exp:q.exp})),2);
    addSec('II','語彙 Словарь','Выбери слово, которое лучше всего подходит к предложению.',
      pick('vocab',5).map(q=>({q:q.s,o:q.o,c:q.c,exp:q.exp})),2);
    addSec('III','漢字語彙 Кандзи-лексика','Выбери правильный кандзи / чтение.',
      pick('kanji',3).map(q=>({q:q.s,o:q.o,c:q.c,exp:q.exp})),3);
    // IV 漢字 読み書き — generated reading + writing from vocab with kanji
    const vpref=sh(C.ITEMS.vocab.filter(v=>hasKanji(v.word)&&C.difficultyOf(v)===diff));
    const vall=sh(C.ITEMS.vocab.filter(v=>hasKanji(v.word)));
    const vpool=(vpref.concat(vall.filter(v=>!vpref.includes(v))));
    const readings=sh([...new Set(vall.map(v=>v.reading))]);
    const words=sh([...new Set(vall.map(v=>v.word))]);
    const ivItems=[]; const used=new Set();
    for(const v of vpool){ if(ivItems.length>=3) break; if(used.has(v.id))continue; used.add(v.id);
      const dist=sh(readings.filter(r=>r!==v.reading)).slice(0,3); if(dist.length<3) continue;
      const o=sh([v.reading,...dist]);
      ivItems.push({q:`「${v.word}」の<u>読み方</u>は？`, o, c:o.indexOf(v.reading), exp:`${v.word} = ${v.reading}（${v.meaning}）`}); }
    for(const v of vpool){ if(ivItems.length>=6) break; if(used.has(v.id))continue; used.add(v.id);
      const dist=sh(words.filter(w=>w!==v.word)).slice(0,3); if(dist.length<3) continue;
      const o=sh([v.word,...dist]);
      ivItems.push({q:`「${v.reading}」（${v.meaning}）を<u>漢字</u>で書くと？`, o, c:o.indexOf(v.word), exp:`${v.reading} → ${v.word}`}); }
    addSec('IV','漢字 Кандзи (чтение и письмо)','Прочитай кандзи и выбери правильный иероглиф для каждого чтения.',ivItems,1);
    // V 読解 — a reading passage at this level + its questions
    const packs=C.PACKS().filter(p=>p.reading&&p.reading.questions&&p.reading.questions.length);
    let cand=sh(packs.filter(p=>(p.difficulty||'medium')===diff)); if(!cand.length) cand=sh(packs);
    if(cand.length){ const p=cand[0];
      addSec('V','読解 Понимание текста','Прочитай текст, затем ответь на вопросы.',
        p.reading.questions.slice(0,3).map(rq=>({q:rq.q,o:rq.o,c:rq.c,exp:rq.exp})),6,
        p.reading.passage, p.reading.title, true); }
    return {level, screens, sec, time:EXAM_TIME[level]};
  }

  function startExam(level){
    if(!examUnlocked(level)){ alert('Сначала сдай предыдущий уровень.'); return; }
    const built=buildExam(level);
    if(built.screens.length<5){ alert('Недостаточно контента для этого уровня. Пройди больше уроков или выбери уровень A.'); return; }
    EX={ level, screens:built.screens, sec:built.sec, i:0, answers:new Array(built.screens.length).fill(null), left:built.time };
    document.getElementById('exam-top').classList.add('show');
    clearInterval(examTimer); examTimer=setInterval(tickTimer,1000);
    renderExamScreen();
    showView('view-exam');
  }

  function fmtTime(s){ const m=Math.floor(s/60), ss=s%60; return m+':'+String(ss).padStart(2,'0'); }
  function tickTimer(){
    if(!EX) return; EX.left--;
    const t=document.getElementById('exam-timer');
    if(t){ t.textContent=fmtTime(Math.max(0,EX.left)); t.classList.toggle('warn',EX.left<=60); }
    if(EX.left<=0){ clearInterval(examTimer); finishExam(true); }
  }

  let examGuard=false;
  function escHTML(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function renderExamScreen(){
    const s=EX.screens[EX.i], n=EX.screens.length;
    document.getElementById('exam-top').innerHTML=`
      <div class="exam-top-row">
        <button class="exam-quit" onclick="App.examQuit()">✕</button>
        <span class="exam-section-pill">Секция ${s.section} · ${s.secLabel}</span>
        <span class="exam-timer" id="exam-timer">${fmtTime(EX.left)}</span>
      </div>
      <div class="exam-prog"><div class="f" style="width:${Math.round((EX.i+1)/n*100)}%"></div></div>`;
    let h='';
    if(s.secFirst) h+=`<div class="exam-sec-head">Секция ${s.section} · ${s.secLabel}</div><div class="exam-sec-desc">${s.secDesc}</div>`;
    if(s.passage) h+=`<div class="exam-passage"><strong>${escHTML(s.passageTitle)||''}</strong>\n\n${escHTML(s.passage)}</div>`;
    h+=`<div class="exam-q">${(EX.i+1)}. ${s.q}</div><div class="opts exam-opts">`;
    s.o.forEach((o,idx)=>h+=`<button class="opt${EX.answers[EX.i]===idx?' sel':''}" onclick="App.examPick(${idx})">${o}</button>`);
    h+=`</div><div class="exam-nav-row">`;
    h+=`<button class="exam-prev" ${EX.i===0?'disabled':''} onclick="App.examPrev()">◂ Назад</button>`;
    h+=`<button class="exam-next" id="exam-next" ${EX.answers[EX.i]==null?'disabled':''} onclick="App.examNext()">${EX.i===n-1?'Завершить ▸':'Далее ▸'}</button></div>`;
    const body=document.getElementById('exam-body'); body.innerHTML=h;
    // Click guard: prevent accidental option selection for 300ms after render
    examGuard=true;
    const optsEl=body.querySelector('.exam-opts');
    if(optsEl) optsEl.classList.add('exam-click-guard');
    setTimeout(()=>{ examGuard=false; if(optsEl) optsEl.classList.remove('exam-click-guard'); },300);
    scrollTo(0,0);
  }
  function examPick(i){
    if(examGuard) return;
    C.haptic('light'); EX.answers[EX.i]=i;
    SFX.flip();
    document.querySelectorAll('#exam-body .opt').forEach((b,idx)=>b.classList.toggle('sel',idx===i));
    const nx=document.getElementById('exam-next'); if(nx) nx.disabled=false;
  }
  function examNext(){
    if(EX.answers[EX.i]==null) return;
    if(EX.i<EX.screens.length-1){ EX.i++; renderExamScreen(); } else finishExam(false);
  }
  function examPrev(){
    if(EX.i>0){ EX.i--; renderExamScreen(); }
  }
  function examQuit(){
    if(!confirm('Выйти из теста? Твой прогресс в этой попытке будет потерян.')) return;
    clearInterval(examTimer); EX=null; openExamHub();
  }

  function finishExam(auto){
    clearInterval(examTimer);
    const secMap={}; EX.sec.forEach(s=>secMap[s.key]={...s});
    let earned=0, poss=0;
    EX.screens.forEach((s,idx)=>{
      poss+=s.pts; const sm=secMap[s.section]; sm.poss+=s.pts;
      const ok=EX.answers[idx]===s.c;
      if(ok){ earned+=s.pts; sm.pts+=s.pts; }
      // Feed exam answers into SRS
      if(s.q_id) C.rate(s.q_id, ok?4:1);
    });
    const pct=poss?Math.round(earned/poss*100):0;
    const passed=pct>=PASS_PCT;
    const lvl=EX.level, prev=C.DB.get('exam_best_'+lvl)||0;
    if(pct>prev) C.DB.set('exam_best_'+lvl,pct);
    if(passed && !C.DB.get('exam_pass_'+lvl)) C.DB.set('exam_pass_'+lvl,true);
    report('exam',{examLevel:lvl,examPct:pct,examPassed:passed,overall:C.overallMastery(),momentum:C.getMomentum().value});
    C.bumpMomentum&&C.bumpMomentum(passed?3:1);
    // XP for exam
    const examXP=Math.round(earned*5+(passed?50:0));
    const xpResult=C.addXP(examXP);
    // Update streak
    C.updateStreak();
    // Sound
    if(passed){ SFX.levelup(); confetti(); } else { SFX.wrong(); }
    // Check badges
    const badges=C.checkBadges();
    const L=LEVELS[lvl];
    const ring = passed
      ? `<div class="exam-score-ring" style="background:linear-gradient(135deg,var(--green),#2979ff)"><div class="pct">${pct}%</div><div class="lab">СДАН</div></div>`
      : `<div class="exam-score-ring" style="background:linear-gradient(135deg,#e69500,#e53935)"><div class="pct">${pct}%</div><div class="lab">ПРОДОЛЖАЙ</div></div>`;
    const nextUnlocked = passed && (lvl==='A'||lvl==='B');
    const breakdown=EX.sec.map(s=>`<div class="exam-brow"><span class="bn">Секция ${s.key} · ${s.label}</span><span class="bs">${s.pts}/${s.poss}</span></div>`).join('');
    const wrong=EX.screens.map((s,idx)=>({s,idx})).filter(x=>EX.answers[x.idx]!==x.s.c);
    const review=wrong.length?`<div class="sect" style="margin-top:1.2rem">Повторение — ${wrong.length} для разбора</div>`+wrong.map(({s,idx})=>`
      <div class="exam-review-q"><div style="font-weight:700;margin-bottom:6px">${s.q}</div>
        <div class="erv-bad">Твой ответ: ${EX.answers[idx]==null?'—':s.o[EX.answers[idx]]}</div>
        <div class="erv-good">Правильно: ${s.o[s.c]}</div>
        ${s.exp?`<div style="color:var(--ink3);margin-top:5px">${s.exp}</div>`:''}</div>`).join(''):
      `<div class="lesson-about" style="text-align:center;margin-top:1rem">Идеально — все ответы верны! 🎉</div>`;
    document.getElementById('exam-top').classList.remove('show');
    let badgeHTML='';
    if(badges.newly && badges.newly.length){
      badgeHTML=`<div class="reward-badges">`+badges.newly.map(b=>`<div class="reward-badge"><div class="rb-icon">${b.icon}</div><div class="rb-title">${b.title}</div><div class="rb-desc">${b.desc}</div></div>`).join('')+`</div>`;
      SFX.badge();
    }
    document.getElementById('exam-body').innerHTML=`
      <div style="text-align:center;margin-top:.5rem">
        <div class="cc-eyebrow" style="color:var(--ink3)">Задание ${lvl} · ${L.jp} ${L.en}${auto?' · время вышло':''}</div>
        ${ring}
        <div class="exam-verdict">${passed?'合格！ Сдан':'がんばって！ Ещё немного — '+PASS_PCT+'% для сдачи'}</div>
        <div style="color:var(--ink3);font-size:13px">Результат ${earned}/${poss} очков${pct>prev?' · новый рекорд!':''}</div>
        <div style="margin-top:8px;font-size:15px;font-weight:900;color:var(--gold)">+${examXP} XP</div>
        ${xpResult.leveledUp?`<div style="margin-top:6px;color:var(--green);font-weight:800">⬆ Уровень ${xpResult.level}!</div>`:''}
        ${nextUnlocked?`<div style="margin-top:10px;color:var(--green);font-weight:800">🔓 Уровень ${lvl==='A'?'B 中級':'C 上級'} открыт!</div>`:''}
      </div>
      ${badgeHTML}
      <div class="exam-breakdown">${breakdown}</div>
      <div style="display:flex;gap:10px;margin:1rem 0">
        <button class="exam-next" style="background:var(--card);color:var(--ink);border:1.5px solid var(--border);margin:0" onclick="App.startExam('${lvl}')">↻ Заново</button>
        <button class="exam-next" style="margin:0" onclick="App.openExamHub()">Меню тестов</button>
      </div>
      ${review}
      <button class="sback" style="margin:1rem 0" onclick="App.home()">← Главная</button>`;
    EX=null; scrollTo(0,0);
  }

  /* ===================== JLPT PLACEMENT TEST ===================== */
  /* JLPT levels: N5 (easiest) → N4 → N3 → N2 → N1 (hardest)
     Real JLPT scoring: each level has 3 sections with sectional pass marks + total pass mark.
     This is a placement test — user can take any level anytime to check their realistic level.
     After completing, we reveal their estimated JLPT level based on performance. */

  // Real JLPT timing (minutes): Vocab/Grammar, Reading, Listening
  // Scaled to ~50% for practice test with ~25 questions
  const JLPT_LEVELS={
    N5:{jp:'N5',en:'Базовый',         jpDesc:'初級基礎',  desc:'Базовая грамматика, хирагана/катакана, ~800 слов', color:'#4caf50', diff:'easy',
        secTime:{vocab_grammar:13*60, reading:25*60, listening:15*60}, time:53*60},
    N4:{jp:'N4',en:'Пред-средний',jpDesc:'初級',    desc:'Начальная грамматика, ~1,500 слов, базовые кандзи', color:'#2196f3', diff:'easy',
        secTime:{vocab_grammar:15*60, reading:30*60, listening:18*60}, time:63*60},
    N3:{jp:'N3',en:'Средний',   jpDesc:'中級',    desc:'Повседневный японский, ~3,000-4,000 слов',         color:'#ff9800', diff:'medium',
        secTime:{vocab_grammar:15*60, reading:35*60, listening:20*60}, time:70*60},
    N2:{jp:'N2',en:'Пред-продвинутый',   jpDesc:'中上級',  desc:'Широкие темы, ~6,000 слов, абстрактное чтение',   color:'#f44336', diff:'medium',
        secTime:{vocab_grammar:18*60, reading:53*60, listening:25*60}, time:96*60},
    N1:{jp:'N1',en:'Продвинутый',       jpDesc:'上級',    desc:'Тонкости, ~10,000 слов, сложные тексты',          color:'#9c27b0', diff:'hard',
        secTime:{vocab_grammar:18*60, reading:55*60, listening:30*60}, time:103*60}
  };
  // JLPT scoring: total out of 180, with 3 sections
  // Section weights vary by level (N5-N4: vocab/grammar=60, reading=60, listening=60)
  // (N3-N1: vocab/grammar=60, reading=60, listening=60) — simplified to 60/60/60 = 180
  const JLPT_SECTIONS=[
    {key:'vocab_grammar', label:'言語知識・文字語彙 Знание языка', maxPoints:60, color:'var(--blue)'},
    {key:'reading',       label:'読解 Чтение',                          maxPoints:60, color:'var(--gold)'},
    {key:'listening',     label:'聴解 Аудирование',                        maxPoints:60, color:'var(--purple)'}
  ];
  // Sectional pass marks (out of 60): must get at least this in each section
  const JLPT_SECTIONAL_PASS={N5:19,N4:19,N3:19,N2:19,N1:19};
  // Total pass marks (out of 180)
  const JLPT_TOTAL_PASS={N5:80,N4:90,N3:95,N2:90,N1:100};
  let JL=null, jlptTimer=null;

  function jlptStatus(level){ return { best:C.DB.get('jlpt_best_'+level)||0, passed:!!C.DB.get('jlpt_pass_'+level), attempts:C.DB.get('jlpt_attempts_'+level)||0 }; }

  function openJlptHub(){
    try{
    clearInterval(jlptTimer); JL=null;
    document.getElementById('exam-top').classList.remove('show');
    const card=(lvl)=>{
      const L=JLPT_LEVELS[lvl], st=jlptStatus(lvl);
      const meta = st.attempts>0
        ? `<div class="jlpt-best">${st.best?st.best+'/180':'—'}</div><div class="jlpt-status ${st.passed?'jlpt-pass':''}">${st.passed?'✓ сдан':'лучший · '+st.attempts+'× попыток'}</div>`
        : `<div class="jlpt-status jlpt-lock">ещё не пройден</div>`;
      return `<button class="jlpt-level-card jlpt-${lvl}" onclick="C.haptic('heavy');App.startJlpt('${lvl}')">
        <div class="jlpt-row">
          <div class="jlpt-badge">${L.jp}</div>
          <div><div class="jlpt-name">${L.jp} · ${L.en}</div><div class="jlpt-desc">${L.jpDesc} · ${L.time/60} min · ${L.desc}</div></div>
          <div class="jlpt-meta">${meta}</div>
        </div>
        <div class="jlpt-secs">言語知識 (Vocab/Grammar/Kanji) · 読解 (Reading) · 聴解 (Listening)</div>
      </button>`;
    };
    // Determine current placement level
    const placement=C.DB.get('jlpt_placement')||null;
    let placementHTML='';
    if(placement){
      const L=JLPT_LEVELS[placement.level];
      placementHTML=`<div class="jlpt-placement-result">
        <div class="pr-icon">🎯</div>
        <div class="pr-title">Твой предполагаемый уровень</div>
        <div class="pr-level">${L.jp}</div>
        <div class="pr-desc">${L.en} · ${L.jpDesc}<br>Последний тест: ${placement.date}</div>
        <div class="pr-points">
          <div class="pr-point"><div class="pp-v">${placement.score}/180</div><div class="pp-l">Общий балл</div></div>
          <div class="pr-point"><div class="pp-v">${placement.passed?'✅':'❌'}</div><div class="pp-l">Результат</div></div>
        </div>
      </div>`;
    }
    document.getElementById('exam-body').innerHTML=`
      <button class="sback" style="margin-bottom:1rem" onclick="App.home()">← Главная</button>
      <div class="jlpt-hub-head">
        <div class="jlpt-hub-title">🎯 JLPT 実力診断 — Тест уровня</div>
        <div class="jlpt-hub-sub">Проверь свой реальный уровень JLPT в любое время. Сдавай любой уровень (N5→N1) — тест использует систему оценивания JLPT (180 баллов, 3 секции с порогом по каждой). После завершения увидишь свой предполагаемый уровень, разбивку по секциям и рекомендации для занятий.</div>
      </div>
      ${placementHTML}
      <div class="jlpt-placement-banner">
        <div class="pb-title">🧭 Не знаешь свой уровень?</div>
        <div class="pb-sub">Пройди тест — начни с N4 (наш текущий уровень контента) и двигайся вверх. Система покажет твой реальный уровень JLPT и на чём сосредоточиться.</div>
        <button class="pb-btn" onclick="C.haptic('heavy');App.startJlpt('N4')">Начать с N4 →</button>
      </div>
      ${card('N5')}${card('N4')}${card('N3')}${card('N2')}${card('N1')}`;
    showView('view-exam');
    }catch(e){ console.error('openJlptHub error:',e); alert('Ошибка открытия JLPT: '+e.message); }
  }

  function buildJlpt(level){
    const L=JLPT_LEVELS[level], diff=L.diff, sh=C.shuffle;
    // Filter bank questions by JLPT level (not difficulty — N5 and N4 share 'easy')
    const bankQs=(window.JLPT_BANK||[]).filter(q=>q.level===level);
    // Lesson questions filtered by matching difficulty
    const lessonQs=C.ITEMS.question.filter(q=>q.type!=='listening'&&q.type!=='comprehension'&&C.difficultyOf(q)===diff);
    const lessonQsAny=C.ITEMS.question.filter(q=>q.type!=='listening'&&q.type!=='comprehension');
    const pick=(dim,n,types)=>{
      // First: bank questions for this level
      let p=bankQs.filter(q=>q.dim===dim&&(!types||types.includes(q.type)));
      // Then: lesson questions at matching difficulty
      if(p.length<n) p=p.concat(lessonQs.filter(q=>q.dim===dim&&(!types||types.includes(q.type))));
      // Finally: any lesson questions
      if(p.length<n) p=p.concat(lessonQsAny.filter(q=>q.dim===dim&&(!types||types.includes(q.type))));
      return sh(p).slice(0,n);
    };
    const screens=[]; const sec={};

    // Section 1: 言語知識 (Vocabulary + Grammar + Kanji) — 60 points
    // Real JLPT N5-N4: vocab=paraphrase+orthography, kanji=readings; N3-N1: vocab=paraphrase+usage, grammar=sentence-grammar
    const vocabQs=pick('vocab',6).map(q=>({q:q.s,o:q.o,c:q.c,exp:q.exp,section:'vocab_grammar',secLabel:'言語知識 Знание языка',pts:5}));
    const grammarQs=pick('grammar',5).map(q=>({q:q.s,o:q.o,c:q.c,exp:q.exp,section:'vocab_grammar',secLabel:'言語知識 Знание языка',pts:5}));
    const kanjiQs=pick('kanji',2).map(q=>({q:q.s,o:q.o,c:q.c,exp:q.exp,section:'vocab_grammar',secLabel:'言語知識 Знание языка',pts:5}));
    // Add kanji reading/writing generated from vocab
    const vall=sh(C.ITEMS.vocab.filter(v=>hasKanji(v.word)));
    const readings=sh([...new Set(vall.map(v=>v.reading))]);
    const words=sh([...new Set(vall.map(v=>v.word))]);
    const kanjiRW=[];
    const used=new Set();
    for(const v of vall){ if(kanjiRW.length>=2) break; if(used.has(v.id))continue; used.add(v.id);
      const dist=sh(readings.filter(r=>r!==v.reading)).slice(0,3); if(dist.length<3) continue;
      const o=sh([v.reading,...dist]);
      kanjiRW.push({q:`「${v.word}」の読み方は？`,o,c:o.indexOf(v.reading),exp:`${v.word} = ${v.reading}（${v.meaning}）`,section:'vocab_grammar',secLabel:'言語知識 Знание языка',pts:5}); }

    // Section 2: 読解 (Reading) — 60 points
    const packs=C.PACKS().filter(p=>p.reading&&p.reading.questions&&p.reading.questions.length);
    let cand=sh(packs.filter(p=>(p.difficulty||'medium')===diff)); if(!cand.length) cand=sh(packs);
    const readingQs=[];
    if(cand.length){ const p=cand[0];
      p.reading.questions.slice(0,4).forEach((rq,i)=>{
        readingQs.push({q:rq.q,o:rq.o,c:rq.c,exp:rq.exp,section:'reading',secLabel:'読解 Чтение',pts:15,
          passage:p.reading.passage,passageTitle:p.reading.title,secFirst:i===0});
      });
    }
    // If not enough reading questions, generate from vocab context
    if(readingQs.length<3){
      const vocabReading=pick('vocab',3).map(q=>({q:q.s,o:q.o,c:q.c,exp:q.exp,section:'reading',secLabel:'読解 Чтение',pts:15}));
      vocabReading.forEach((v,i)=>{v.secFirst=readingQs.length===0&&i===0; readingQs.push(v);});
    }

    // Section 3: 聴解 (Listening) — 60 points
    const listenPool=C.ITEMS.vocab.filter(v=>v.example).slice(0,6);
    const listeningQs=listenPool.map((v,i)=>{
      const dist=sh(C.ITEMS.vocab.filter(x=>x.id!==v.id).map(x=>x.word||x.reading)).slice(0,3);
      if(dist.length<3) dist.push('—','—','—');
      const o=sh([v.word||v.reading,...dist]);
      return {q:'▶ 聞いて、正しい答えを選んでください。 Слушай и выбери правильный ответ.',o,c:o.indexOf(v.word||v.reading),
        exp:`${v.word} = ${v.meaning}`,section:'listening',secLabel:'聴解 Аудирование',pts:10,
        audioText:v.example||v.word,secFirst:i===0};
    });
    if(listeningQs.length<3){
      // Fallback: use grammar examples as listening
      const grammarListen=pick('grammar',3).map(q=>({q:'▶ 聞いて、正しい答えを選んでください。',o:q.o,c:q.c,exp:q.exp,section:'listening',secLabel:'聴解 Аудирование',pts:10,audioText:q.s||'',secFirst:false}));
      grammarListen.forEach((g,i)=>{g.secFirst=listeningQs.length===0&&i===0; listeningQs.push(g);});
    }

    // Combine all screens
    const allScreens=[...vocabQs,...grammarQs,...kanjiQs,...kanjiRW,...readingQs,...listeningQs];
    // Mark section firsts
    let seenSections={};
    allScreens.forEach(s=>{
      if(!seenSections[s.section]){ s.secFirst=true; seenSections[s.section]=true; }
      else s.secFirst=false;
    });

    return {level, screens:allScreens, time:L.time};
  }

  function startJlpt(level){
    try{
    const built=buildJlpt(level);
    if(built.screens.length<5){ alert('Недостаточно контента для этого уровня. Пройди больше уроков или выбери N5.'); return; }
    JL={ level, screens:built.screens, i:0, answers:new Array(built.screens.length).fill(null), left:built.time };
    document.getElementById('exam-top').classList.add('show');
    clearInterval(jlptTimer); jlptTimer=setInterval(tickJlptTimer,1000);
    renderJlptScreen();
    showView('view-exam');
    }catch(e){ console.error('startJlpt error:',e); alert('Ошибка запуска теста: '+e.message); }
  }

  function tickJlptTimer(){
    if(!JL) return; JL.left--;
    const t=document.getElementById('exam-timer');
    if(t){ t.textContent=fmtTime(Math.max(0,JL.left)); t.classList.toggle('warn',JL.left<=60); }
    if(JL.left<=0){ clearInterval(jlptTimer); finishJlpt(true); }
  }

  function renderJlptScreen(){
    const s=JL.screens[JL.i], n=JL.screens.length;
    const L=JLPT_LEVELS[JL.level];
    document.getElementById('exam-top').innerHTML=`
      <div class="exam-top-row">
        <button class="exam-quit" onclick="App.jlptQuit()">✕</button>
        <span class="exam-section-pill">${L.jp} · ${s.secLabel}</span>
        <span class="exam-timer" id="exam-timer">${fmtTime(JL.left)}</span>
      </div>
      <div class="exam-prog"><div class="f" style="width:${Math.round((JL.i+1)/n*100)}%"></div></div>`;
    let h='';
    if(s.secFirst) h+=`<div class="exam-sec-head">${s.secLabel}</div><div class="exam-sec-desc">Секция ${s.section==='vocab_grammar'?'1':s.section==='reading'?'2':'3'} из 3 · ${s.pts} баллов за вопрос</div>`;
    if(s.passage) h+=`<div class="exam-passage"><strong>${escHTML(s.passageTitle)||''}</strong>\n\n${escHTML(s.passage)}</div>`;
    if(s.audioText){ h+=`<div style="text-align:center;margin-bottom:14px"><button class="listen-btn" onclick="sayNow('${sayRef(s.audioText)}')">▶ 聞く Слушать</button></div>`; }
    h+=`<div class="exam-q">${(JL.i+1)}. ${s.q}</div><div class="opts exam-opts">`;
    s.o.forEach((o,idx)=>h+=`<button class="opt${JL.answers[JL.i]===idx?' sel':''}" onclick="App.jlptPick(${idx})">${o}</button>`);
    h+=`</div><div class="exam-nav-row">`;
    h+=`<button class="exam-prev" ${JL.i===0?'disabled':''} onclick="App.jlptPrev()">◂ Назад</button>`;
    h+=`<button class="exam-next" id="exam-next" ${JL.answers[JL.i]==null?'disabled':''} onclick="App.jlptNext()">${JL.i===n-1?'Завершить ▸':'Далее ▸'}</button></div>`;
    const body=document.getElementById('exam-body'); body.innerHTML=h;
    // Click guard
    examGuard=true;
    const optsEl=body.querySelector('.exam-opts');
    if(optsEl) optsEl.classList.add('exam-click-guard');
    setTimeout(()=>{ examGuard=false; if(optsEl) optsEl.classList.remove('exam-click-guard'); },300);
    scrollTo(0,0);
    if(s.audioText) setTimeout(()=>speak(s.audioText),400);
  }

  function jlptPick(i){
    if(examGuard) return;
    C.haptic('light'); JL.answers[JL.i]=i;
    SFX.flip();
    document.querySelectorAll('#exam-body .opt').forEach((b,idx)=>b.classList.toggle('sel',idx===i));
    const nx=document.getElementById('exam-next'); if(nx) nx.disabled=false;
  }
  function jlptNext(){
    if(JL.answers[JL.i]==null) return;
    if(JL.i<JL.screens.length-1){ JL.i++; renderJlptScreen(); } else finishJlpt(false);
  }
  function jlptPrev(){
    if(JL.i>0){ JL.i--; renderJlptScreen(); }
  }
  function jlptQuit(){
    if(!confirm('Выйти из теста JLPT? Твой прогресс в этой попытке будет потерян.')) return;
    clearInterval(jlptTimer); JL=null; openJlptHub();
  }

  function finishJlpt(auto){
    clearInterval(jlptTimer);
    const level=JL.level;
    // Calculate section scores
    const sectionScores={vocab_grammar:{earned:0,poss:0},reading:{earned:0,poss:0},listening:{earned:0,poss:0}};
    JL.screens.forEach((s,idx)=>{
      const ok=JL.answers[idx]===s.c;
      sectionScores[s.section].poss+=s.pts;
      if(ok) sectionScores[s.section].earned+=s.pts;
      // Feed into SRS
      if(s.q_id) C.rate(s.q_id, ok?4:1);
    });
    // Convert to JLPT scaled scores (out of 60 per section, out of 180 total)
    const scaled={};
    let totalScaled=0;
    JLPT_SECTIONS.forEach(sec=>{
      const raw=sectionScores[sec.key];
      const pct=raw.poss?raw.earned/raw.poss:0;
      const scaledScore=Math.round(pct*sec.maxPoints);
      scaled[sec.key]=scaledScore;
      totalScaled+=scaledScore;
    });
    const totalPass=JLPT_TOTAL_PASS[level];
    const sectionPass=JLPT_SECTIONAL_PASS[level];
    const passed=scaled.vocab_grammar>=sectionPass && scaled.reading>=sectionPass && scaled.listening>=sectionPass && totalScaled>=totalPass;

    // Save results
    const prev=C.DB.get('jlpt_best_'+level)||0;
    if(totalScaled>prev) C.DB.set('jlpt_best_'+level,totalScaled);
    if(passed) C.DB.set('jlpt_pass_'+level,true);
    C.DB.set('jlpt_attempts_'+level,(C.DB.get('jlpt_attempts_'+level)||0)+1);

    // Update placement
    C.DB.set('jlpt_placement',{level,score:totalScaled,passed,date:new Date().toISOString().slice(0,10)});

    report('jlpt',{jlptLevel:level,jlptScore:totalScaled,jlptPassed:passed,overall:C.overallMastery(),momentum:C.getMomentum().value});

    // XP
    const jlptXP=Math.round(totalScaled*0.8+(passed?80:0));
    const xpResult=C.addXP(jlptXP);
    C.updateStreak();
    const badges=C.checkBadges();

    // Sound
    if(passed){ SFX.levelup(); confetti(); } else { SFX.wrong(); }

    // Determine realistic level recommendation
    const levelOrder=['N5','N4','N3','N2','N1'];
    const levelIdx=levelOrder.indexOf(level);
    let recommendLevel=level;
    let recommendDesc='';
    if(passed && levelIdx<4){
      recommendLevel=levelOrder[levelIdx+1];
      recommendDesc=`Ты сдала ${level}! Готова бросить вызов ${recommendLevel}. Продолжай заниматься, чтобы расти дальше.`;
    } else if(!passed){
      if(levelIdx>0){
        recommendLevel=levelOrder[levelIdx-1];
        recommendDesc=`${level} пока сложноват. Твой реальный уровень — около ${recommendLevel}. Сосредоточься на секциях ниже 19 баллов.`;
      } else {
        recommendDesc=`N5 — отправная точка. Продолжай строить базу словаря и грамматики. Ты дойдёшь!`;
      }
    } else {
      recommendDesc=`Отлично! Ты освоила ${level}. Это высший уровень — поддерживай его регулярным повторением.`;
    }

    // Section breakdown
    const sectionBreakdown=JLPT_SECTIONS.map(sec=>{
      const score=scaled[sec.key];
      const pct=Math.round(score/sec.maxPoints*100);
      const passMark=sectionPass;
      const passedSec=score>=passMark;
      return `<div class="jlpt-section-score">
        <span class="jss-label">${sec.label}</span>
        <div class="jss-bar"><div class="f" style="width:${pct}%;background:${passedSec?'var(--green)':'var(--red)'}"></div></div>
        <span class="jss-val" style="color:${passedSec?'var(--green)':'var(--red)'}">${score}/${sec.maxPoints} ${passedSec?'✓':'✗'}</span>
      </div>`;
    }).join('');

    // Wrong answers review
    const wrong=JL.screens.map((s,idx)=>({s,idx})).filter(x=>JL.answers[x.idx]!==x.s.c);
    const review=wrong.length?`<div class="sect" style="margin-top:1.2rem">Повторение — ${wrong.length} для разбора</div>`+wrong.map(({s,idx})=>`
      <div class="exam-review-q"><div style="font-weight:700;margin-bottom:6px">${s.q}</div>
        <div class="erv-bad">Твой ответ: ${JL.answers[idx]==null?'—':s.o[JL.answers[idx]]}</div>
        <div class="erv-good">Правильно: ${s.o[s.c]}</div>
        ${s.exp?`<div style="color:var(--ink3);margin-top:5px">${s.exp}</div>`:''}</div>`).join(''):
      `<div class="lesson-about" style="text-align:center;margin-top:1rem">Идеально — все ответы верны! 🎉</div>`;

    // Badge HTML
    let badgeHTML='';
    if(badges.newly && badges.newly.length){
      badgeHTML=`<div class="reward-badges">`+badges.newly.map(b=>`<div class="reward-badge"><div class="rb-icon">${b.icon}</div><div class="rb-title">${b.title}</div><div class="rb-desc">${b.desc}</div></div>`).join('')+`</div>`;
      SFX.badge();
    }

    document.getElementById('exam-top').classList.remove('show');
    document.getElementById('exam-body').innerHTML=`
      <button class="sback" style="margin-bottom:1rem" onclick="App.openJlptHub()">← Меню JLPT</button>
      <div style="text-align:center;margin-top:.5rem">
        <div class="cc-eyebrow" style="color:var(--ink3)">${JLPT_LEVELS[level].jp} · ${JLPT_LEVELS[level].en}${auto?' · время вышло':''}</div>
      </div>
      <div class="jlpt-placement-result">
        <div class="pr-icon">${passed?'🎉':'📊'}</div>
        <div class="pr-title">${passed?'合格！ Сдан':'もう少し — Почти'}</div>
        <div class="pr-level">${JLPT_LEVELS[level].jp}</div>
        <div class="pr-desc">${JLPT_LEVELS[level].en} · ${JLPT_LEVELS[level].jpDesc}</div>
        <div class="pr-points">
          <div class="pr-point"><div class="pp-v">${totalScaled}</div><div class="pp-l">/ 180 Итого</div></div>
          <div class="pr-point"><div class="pp-v">${totalPass}</div><div class="pp-l">Проходной балл</div></div>
          <div class="pr-point"><div class="pp-v">${passed?'✅':'❌'}</div><div class="pp-l">Результат</div></div>
        </div>
      </div>
      <div style="margin-top:8px;font-size:15px;font-weight:900;color:var(--gold);text-align:center">+${jlptXP} XP</div>
      ${xpResult.leveledUp?`<div style="margin-top:6px;color:var(--green);font-weight:800;text-align:center">⬆ Уровень ${xpResult.level}!</div>`:''}
      ${badgeHTML}
      <div class="jlpt-score-display">
        <div class="js-verdict">Разбивка по секциям</div>
        <div style="margin-top:10px;border:1px solid var(--border);border-radius:12px;overflow:hidden">${sectionBreakdown}</div>
      </div>
      <div class="jlpt-recommend">
        <div class="jr-title">🎯 Рекомендация для занятий</div>
        ${recommendDesc}
        <div style="margin-top:8px;font-weight:800;color:var(--blue)">Рекомендуемый следующий: ${recommendLevel}</div>
      </div>
      <div style="display:flex;gap:10px;margin:1rem 0">
        <button class="exam-next" style="background:var(--card);color:var(--ink);border:1.5px solid var(--border);margin:0" onclick="App.startJlpt('${level}')">↻ Заново ${level}</button>
        <button class="exam-next" style="margin:0" onclick="App.openJlptHub()">Меню JLPT</button>
      </div>
      ${review}
      <button class="sback" style="margin:1rem 0" onclick="App.home()">← Главная</button>`;
    JL=null; scrollTo(0,0);
  }

  /* ===================== THREAD FEED (dopamine threads) ===================== */
  const FEED_DAILY_LIMIT = 3;
  let feedState = { threads: [], loaded: 0, date: null };

  function getFeedState() {
    const s = C.DB.get('feed_state') || { threads: [], date: null };
    const today = C.dateKey();
    if (s.date !== today) { s.threads = []; s.date = today; C.DB.set('feed_state', s); }
    feedState = s;
    return s;
  }

  function feedRemaining() {
    const s = getFeedState();
    return Math.max(0, FEED_DAILY_LIMIT - s.threads.length);
  }

  function goFeed() {
    setActiveNav('bn-feed');
    showView('view-feed');
    renderFeed();
    // Clear badge
    const badge = document.getElementById('bn-feed-badge');
    if (badge) badge.style.display = 'none';
  }

  async function renderFeed() {
    const body = document.getElementById('feed-body');
    const sub = document.getElementById('feed-remaining');
    const s = getFeedState();
    const remaining = feedRemaining();

    // Update header subtitle
    if (remaining > 0) {
      sub.textContent = `あと${remaining}スレッド · 日本語を読もう`;
    } else {
      // Calculate time until midnight
      const now = new Date();
      const tomorrow = new Date(now);
      tomorrow.setHours(24, 0, 0, 0);
      const hours = Math.floor((tomorrow - now) / 3600000);
      const mins = Math.floor(((tomorrow - now) % 3600000) / 60000);
      sub.textContent = `今日のスレッドは全部読みました · あと${hours}時間${mins}分`;
    }

    if (s.threads.length === 0 && remaining > 0) {
      // Show loading + auto-fetch first thread
      body.innerHTML = `<div class="feed-loading"><div class="fl-spinner"></div><div class="fl-text">スレッドを読み込んでいます…</div></div>`;
      await fetchAndAddThread();
    }

    renderFeedThreads();
  }

  async function fetchAndAddThread() {
    const s = getFeedState();
    if (feedRemaining() <= 0) return false;

    try {
      const placement = C.DB.get('jlpt_placement');
      const level = (placement && placement.level) || 'N4';
      const r = await fetch('/api/thread?level=' + level);
      const j = await r.json();
      if (j.ok && j.thread) {
        s.threads.push({ ...j.thread, readAt: Date.now(), source: j.source });
        C.DB.set('feed_state', s);
        return true;
      }
      // API returned non-OK — use static fallback
      const fallback = getStaticFallbackThread();
      if (fallback) {
        s.threads.push({ ...fallback, readAt: Date.now(), source: 'static' });
        C.DB.set('feed_state', s);
        return true;
      }
    } catch (e) {
      // Network error — use a static thread directly
      const fallback = getStaticFallbackThread();
      if (fallback) {
        s.threads.push({ ...fallback, readAt: Date.now(), source: 'static' });
        C.DB.set('feed_state', s);
        return true;
      }
    }
    return false;
  }

  function getStaticFallbackThread() {
    const bank = (window.FEED_THREADS || []).filter(t => t && t.id);
    if (!bank.length) return null;
    // Try to match user's level from JLPT placement
    const placement = C.DB.get('jlpt_placement');
    const level = (placement && placement.level) || 'N4';
    const levelMap = { 'N5':'easy', 'N4':'easy', 'N3':'medium', 'N2':'hard', 'N1':'hard' };
    const preferredDiff = levelMap[level] || 'easy';
    const matched = bank.filter(t => t.difficulty === preferredDiff);
    const pool = matched.length ? matched : bank;
    return pool[Math.floor(Math.random() * pool.length)];
  }

  function renderFeedThreads() {
    const body = document.getElementById('feed-body');
    const s = getFeedState();
    const remaining = feedRemaining();
    const sub = document.getElementById('feed-remaining');
    const dotsEl = document.getElementById('feed-dots');
    const read = s.threads.length;

    let dotsHTML = '';
    for (let i = 0; i < FEED_DAILY_LIMIT; i++) {
      dotsHTML += `<div class="feed-dot${i < read ? ' filled' : ''}"></div>`;
    }
    dotsEl.innerHTML = dotsHTML;

    if (remaining > 0) {
      sub.textContent = `あと${remaining}スレッド · 日本語を読もう`;
    } else {
      const now = new Date();
      const tomorrow = new Date(now);
      tomorrow.setHours(24, 0, 0, 0);
      const hours = Math.floor((tomorrow - now) / 3600000);
      const mins = Math.floor(((tomorrow - now) % 3600000) / 60000);
      sub.textContent = `今日のスレッドは全部読みました · あと${hours}時間${mins}分`;
    }

    // Tag class mapping for Japanese tags
    const tagClassMap = { '日常':'t-Culture', '文化':'t-Culture', '自然':'t-Reading', '仕事':'t-Grammar', '料理':'t-Vocabulary', '勉強':'t-Kanji', '旅行':'t-Reading', '健康':'t-Vocabulary', 'ため口':'t-Listening' };
    const diffLabel = { easy:'初級', medium:'中級', hard:'上級' };
    const diffIcon = { easy:'🟢', medium:'🟡', hard:'🔴' };

    let html = '';
    s.threads.forEach((t, idx) => {
      const diff = t.difficulty || 'easy';
      const tagClass = tagClassMap[t.tag] || 't-Culture';
      const levelBadge = t.level || 'N4';
      const threadLikes = C.DB.get('feed_likes_' + t.id) || 0;

      const postsHTML = t.posts.map((p, i) => {
        const isLast = i === t.posts.length - 1;
        const postLikeKey = 'feed_like_' + t.id + '_' + i;
        const liked = C.DB.get(postLikeKey);
        const countKey = 'feed_like_count_' + t.id + '_' + i;
        let likeCount = C.DB.get(countKey);
        if(!likeCount){ likeCount = Math.floor(Math.random() * 20) + 1; C.DB.set(countKey, likeCount); }
        return `<div class="thread-post-line">
          <div class="thread-post-row">
            <div class="thread-post-avatar">${t.emoji}</div>
            <div class="thread-post-content">
              <div class="thread-post-name"><span>${t.title}</span><span class="tpn-level">${levelBadge}</span></div>
              <div class="thread-post-text" style="animation-delay:${.15 * i}s">${p}</div>
              <div class="thread-post-actions">
                <div class="tp-action ${liked === 'like' ? 'liked' : ''}" onclick="App.toggleFeedLike('${t.id}',${i},'like')">
                  <span class="tp-icon">${liked === 'like' ? '❤️' : '🤍'}</span>
                  <span class="tp-count">${likeCount + (liked === 'like' ? 1 : 0)}</span>
                </div>
                <div class="tp-action ${liked === 'dislike' ? 'disliked' : ''}" onclick="App.toggleFeedLike('${t.id}',${i},'dislike')">
                  <span class="tp-icon">${liked === 'dislike' ? '👎' : '👎🏻'}</span>
                </div>
              </div>
            </div>
          </div>
        </div>`;
      }).join('');

      html += `<div class="thread-card unread">
        <div class="thread-head">
          <div class="thread-emoji">${t.emoji}</div>
          <div class="thread-title">${t.title}<span class="thread-tag ${tagClass}">${t.tag}</span><span class="thread-diff thread-diff-${diff}">${diffIcon[diff]} ${diffLabel[diff]}</span></div>
        </div>
        <div class="thread-posts" style="padding-top:4px">${postsHTML}</div>
        <a class="thread-cta" href="javascript:void(0)" onclick="App.goPractice()"><span>${t.cta}</span><span class="cta-arrow">→</span></a>
      </div>`;
    });

    if (remaining > 0) {
      html += `<button class="feed-more" onclick="App.loadNextThread()">🌸 次のスレッドを読む <span style="opacity:.7">(あと${remaining})</span></button>`;
    } else {
      const now = new Date();
      const tomorrow = new Date(now);
      tomorrow.setHours(24, 0, 0, 0);
      const hours = Math.floor((tomorrow - now) / 3600000);
      const mins = Math.floor(((tomorrow - now) % 3600000) / 60000);
      html += `<div class="feed-empty">
        <div class="feed-empty-icon">🌸</div>
        <div class="feed-empty-title">今日は全部読みました！</div>
        <div class="feed-empty-sub">${FEED_DAILY_LIMIT}スレッド全部読みました。明日も新しいスレッドが待っています。</div>
        <div class="feed-timer">⏰ あと${hours}時間${mins}分</div>
      </div>`;
    }

    body.innerHTML = html;
  }

  function toggleFeedLike(threadId, postIdx, type) {
    const key = 'feed_like_' + threadId + '_' + postIdx;
    const current = C.DB.get(key);
    if (current === type) {
      C.DB.set(key, null);
    } else {
      C.DB.set(key, type);
      C.haptic('light');
    }
    renderFeedThreads();
  }

  async function loadNextThread() {
    const body = document.getElementById('feed-body');
    // Append loading at the bottom
    const loadingEl = document.createElement('div');
    loadingEl.className = 'feed-loading';
    loadingEl.innerHTML = '<div class="fl-spinner"></div><div class="fl-text">スレッドを読み込んでいます…</div>';
    body.appendChild(loadingEl);

    const ok = await fetchAndAddThread();
    loadingEl.remove();
    renderFeedThreads();
  }

  // Check for new feed availability on home render
  function checkFeedBadge() {
    const remaining = feedRemaining();
    const badge = document.getElementById('bn-feed-badge');
    if (badge) {
      if (remaining > 0) { badge.style.display = 'flex'; badge.textContent = '!'; }
      else { badge.style.display = 'none'; }
    }
  }

  /* ===================== MANGA READER ===================== */
  let _mangaStory=null, _mangaChapter=null, _mangaPanelIdx=0, _mangaShowFuri=true, _mangaShowTrans=true;

  function openMangaHub(){
    const stories=window.MANGA_STORIES||[];
    const progress=C.DB.get('manga_progress')||{};
    const cards=stories.map(s=>{
      const sp=progress[s.id]||{};
      const totalCh=s.chapters.length;
      const doneCh=s.chapters.filter(c=>sp[c.id]).length;
      const lvlClass=s.level.toLowerCase();
      return `<div class="manga-story-card" onclick="App.openMangaStory('${s.id}')">
        <div class="manga-sc-head">
          <div class="manga-sc-cover">${s.cover}</div>
          <div class="manga-sc-info">
            <div class="manga-sc-title">${s.title}</div>
            <div class="manga-sc-titleen">${s.titleEn}</div>
          </div>
          <div class="manga-sc-level ${lvlClass}">${s.level}</div>
        </div>
        <div class="manga-sc-desc">${s.desc}</div>
        <div class="manga-sc-meta">
          <span class="manga-sc-tag">📖 ${totalCh} глав${totalCh>1?'ы':''}</span>
          <span class="manga-sc-tag">✅ ${doneCh}/${totalCh} готово</span>
          <span class="manga-sc-tag">📝 ${s.chapters.reduce((a,c)=>a+c.panels.length,0)} панелей</span>
        </div>
      </div>`;
    }).join('');
    document.getElementById('manga-body').innerHTML=`
      <button class="sback" style="margin-bottom:1rem" onclick="App.home()">← Главная</button>
      <div class="manga-hub-head">
        <div class="manga-hub-title">📚 マンガで読む — Чтение манги</div>
        <div class="manga-hub-sub">Оригинальные градуированные истории для изучающих японский. Читай по панелям с фуриганой, аудио и словарём. Нажми на панель, чтобы услышать произношение.</div>
      </div>
      ${cards||'<div class="empty-state"><div class="es-icon">📚</div><div class="es-title">Историй пока нет</div><div class="es-sub">Скоро появится новый контент!</div></div>'}`;
    showView('view-manga');
  }

  function openMangaStory(storyId){
    const stories=window.MANGA_STORIES||[];
    const s=stories.find(x=>x.id===storyId);
    if(!s) return;
    _mangaStory=s;
    const progress=C.DB.get('manga_progress')||{};
    const sp=progress[s.id]||{};
    const chapters=s.chapters.map((c,i)=>{
      const done=sp[c.id];
      return `<div class="manga-chapter-item" onclick="App.startMangaChapter('${c.id}')">
        <div class="manga-chapter-num">${i+1}</div>
        <div class="manga-chapter-info">
          <div class="manga-chapter-title">${c.title}</div>
          <div class="manga-chapter-titleen">${c.titleEn} · ${c.panels.length} панелей</div>
        </div>
        <span class="${done?'manga-chapter-done':'manga-chapter-arrow'}">${done?'✓':'▸'}</span>
      </div>`;
    }).join('');
    const lvlClass=s.level.toLowerCase();
    document.getElementById('manga-body').innerHTML=`
      <button class="sback" style="margin-bottom:1rem" onclick="App.openMangaHub()">← Список манги</button>
      <div class="manga-story-card" style="cursor:default">
        <div class="manga-sc-head">
          <div class="manga-sc-cover" style="width:72px;height:72px;font-size:48px">${s.cover}</div>
          <div class="manga-sc-info">
            <div class="manga-sc-title" style="font-size:18px">${s.title}</div>
            <div class="manga-sc-titleen">${s.titleEn}</div>
            <div class="manga-sc-desc" style="margin-top:4px">${s.desc}</div>
          </div>
          <div class="manga-sc-level ${lvlClass}">${s.level}</div>
        </div>
      </div>
      <div class="manga-chapter-list">${chapters}</div>`;
    showView('view-manga');
  }

  function startMangaChapter(chId){
    if(!_mangaStory) return;
    const ch=_mangaStory.chapters.find(c=>c.id===chId);
    if(!ch) return;
    _mangaChapter=ch;
    _mangaPanelIdx=0;
    _mangaShowFuri=true;
    _mangaShowTrans=true;
    renderMangaPanel();
  }

  function renderMangaPanel(){
    if(!_mangaChapter) return;
    const p=_mangaChapter.panels[_mangaPanelIdx];
    const n=_mangaChapter.panels.length;
    const pct=Math.round((_mangaPanelIdx+1)/n*100);
    const sRef=sayRef(p.jp);
    const vocabHTML=(p.vocab||[]).map(v=>`<span class="manga-vocab-chip"><span class="vc-w">${v.w}</span> <span class="vc-m">${v.m}</span></span>`).join('');
    document.getElementById('manga-body').innerHTML=`
      <div class="manga-reader-top">
        <div class="manga-reader-progress">
          <button class="manga-panel-btn" onclick="App.openMangaStory('${_mangaStory.id}')">✕</button>
          <div class="manga-reader-bar"><div class="f" style="width:${pct}%"></div></div>
          <span class="manga-reader-count">${_mangaPanelIdx+1}/${n}</span>
        </div>
      </div>
      <div class="manga-panel">
        <div class="manga-panel-emoji">${p.emoji}</div>
        <div class="manga-panel-jp">${escHTML(p.jp)}</div>
        ${_mangaShowFuri?`<div class="manga-panel-reading">${escHTML(p.reading)}</div><div class="manga-panel-romaji">${escHTML(p.romaji)}</div>`:''}
        ${_mangaShowTrans?`<div class="manga-panel-en">${escHTML(p.en)}</div>`:''}
        <div class="manga-panel-audio">
          <button class="manga-panel-btn" onclick="sayNow('${sRef}')">▶ 聞く Слушать</button>
          <button class="manga-panel-btn furi" onclick="App.toggleMangaFuri()">${_mangaShowFuri?'ふりがな OFF':'ふりがな ON'}</button>
          <button class="manga-panel-btn" onclick="App.toggleMangaTrans()">${_mangaShowTrans?'EN OFF':'EN ON'}</button>
        </div>
        ${vocabHTML?`<div class="manga-panel-vocab"><div class="manga-panel-vocab-title">語彙 Словарь</div>${vocabHTML}</div>`:''}
        <div class="manga-panel-nav">
          <button class="manga-nav-btn prev" ${_mangaPanelIdx===0?'disabled onclick=""':'onclick="App.mangaPrev()"'}>◂ Назад</button>
          ${_mangaPanelIdx<n-1
            ?`<button class="manga-nav-btn next" onclick="App.mangaNext()">Далее ▸</button>`
            :`<button class="manga-nav-btn next" onclick="App.finishMangaChapter()">Завершить ✓</button>`}
        </div>
      </div>`;
    scrollTo(0,0);
    setTimeout(()=>speak(p.jp),300);
  }

  function mangaNext(){
    if(_mangaChapter&&_mangaPanelIdx<_mangaChapter.panels.length-1){
      _mangaPanelIdx++;
      renderMangaPanel();
    }
  }
  function mangaPrev(){
    if(_mangaPanelIdx>0){
      _mangaPanelIdx--;
      renderMangaPanel();
    }
  }
  function toggleMangaFuri(){ _mangaShowFuri=!_mangaShowFuri; renderMangaPanel(); }
  function toggleMangaTrans(){ _mangaShowTrans=!_mangaShowTrans; renderMangaPanel(); }

  function finishMangaChapter(){
    if(!_mangaStory||!_mangaChapter) return;
    const sid=_mangaStory.id, cid=_mangaChapter.id;
    const progress=C.DB.get('manga_progress')||{};
    if(!progress[sid]) progress[sid]={};
    progress[sid][cid]=true;
    C.DB.set('manga_progress',progress);
    C.logActivity(_mangaChapter.panels.length,2);
    C.bumpMomentum(5);
    const xpRes=C.addXP(30);
    C.updateStreak();
    const totalCh=_mangaStory.chapters.length;
    const doneCh=Object.keys(progress[sid]).length;
    const allDone=doneCh>=totalCh;
    document.getElementById('manga-body').innerHTML=`
      <div class="manga-complete">
        <div class="manga-complete-emoji">${allDone?'🎉':'✅'}</div>
        <div class="manga-complete-title">${allDone?'История завершена!':'Глава завершена!'}</div>
        <div class="manga-complete-sub">${_mangaChapter.titleEn}<br>${doneCh}/${totalCh} глав готово · +30 XP${xpRes.leveledUp?' · ⬆ Уровень '+xpRes.level:''}</div>
        ${allDone?'<div style="font-size:40px;margin-bottom:1rem">🎊</div>':''}
        <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
          <button class="manga-nav-btn prev" onclick="App.openMangaStory('${sid}')">📖 Главы</button>
          <button class="manga-nav-btn prev" onclick="App.openMangaHub()">📚 Все истории</button>
          <button class="manga-nav-btn next" onclick="App.home()">🏠 Главная</button>
        </div>
      </div>`;
    C.haptic('success'); SFX.levelup(); confetti();
    scrollTo(0,0);
  }

  return {renderHome,reloadContent,openLesson,lessonTab,markLearned,revealRecall,gradeRecall,answer,nextQ,
          startReview,startGlobalReview,startFlashcards,renderFlashHub,startFlashDeck,setFhFilter,setFhLevel,setFhLesson,backToLesson,lessonReadingQuiz,
          practiceVocab,practiceReadingDrill,practiceGrammar,practiceKanji,
          practiceListening,practiceReading,practiceMixed,practiceWrite,
          setExamDate,openExamHub,startExam,examPick,examNext,examPrev,examQuit,
          exitSession,home,
          toggleSound,toggleDark,toggleFurigana,startStrengthen,
          goHome,goPractice,goBadges,goFeed,loadNextThread,toggleFeedLike,showRewardScreen,reviewMistakes,
          openJlptHub,startJlpt,jlptPick,jlptNext,jlptPrev,jlptQuit,toggleSettings,
          toggleNotif,setNotifTime,
          openMangaHub,openMangaStory,startMangaChapter,mangaNext,mangaPrev,toggleMangaFuri,toggleMangaTrans,finishMangaChapter};
})();

/* ── INIT ── */
(async function(){
  flushReportQueue();
  C.loadContent(()=>{
    App.renderHome();
    // Handle PWA shortcut actions
    const params=new URLSearchParams(location.search);
    const action=params.get('action');
    if(action==='continue'){
      const nums=C.lessonNums();
      const current=nums.find(n=>!C.isLessonComplete(n)) || nums[nums.length-1];
      if(current) App.openLesson(current);
    } else if(action==='flashcards'){
      App.startFlashcards();
    } else if(action==='jlpt'){
      App.openJlptHub();
    }
    // Clean URL
    if(action) history.replaceState({},'',location.pathname);
  });
})();
</script>
</body>
