<!DOCTYPE html>
<html lang="ja">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<link rel="manifest" href="/manifest.json">

<link rel="apple-touch-icon" href="/apple-touch-icon.png">

<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<meta name="description" content="Японский Махым — персональная система изучения японского. SRS, тест JLPT, пробные тесты и ежедневное наставничество. N4 → N1.">
<meta property="og:title" content="Mahym's Japanese — 道">
<meta property="og:description" content="Персональная система изучения японского: SRS, тест JLPT, пробные тесты и ежедневное наставничество.">
