<title>🌸 Mahym's Japanese</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f0ede8;--card:#ffffff;--ink:#1c1c2e;--ink2:#52526e;--ink3:#9898b0;
  --red:#ff4b4b;--red-soft:#ffeeee;--green:#00c853;--green-soft:#eafaf1;
  --blue:#2979ff;--blue-soft:#eff4ff;--gold:#ffb300;--gold-soft:#fff8e1;
  --purple:#8e24aa;--purple-soft:#f3e5f5;--border:#e4e0d8;
  --shadow:0 4px 12px rgba(28,28,46,.06),0 1px 3px rgba(28,28,46,.04);
  --r:20px;--spring:cubic-bezier(0.34,1.56,0.64,1);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
body{font-family:'Inter','Noto Sans JP',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;font-size:15px;overflow-x:hidden;overscroll-behavior-y:none}
/* Long-press to SELECT Japanese → iOS shows the blue highlight + Look Up / Translate.
   Selection is ON by default; we only turn it OFF on tappable chrome (buttons, tiles, nav). */
button,.tile,.lesson-card,.opt,.rate,.m-cta,.next-btn,.reveal-btn,.shead,.fc-scene,.hero,.diff-badge,.seg,.seg-btn,.lcta,.bottom-nav,.thread-cta,.feed-more{-webkit-user-select:none;user-select:none}
.passage,.recall-ex,.recall-eglist,.recall-cue,.recall-main,.recall-reading,.teach .ex,.teach li,.teach .big,.teach .read,.q-sentence,.vocab-jp,.vocab-ex,.gram-ex,.gram-card,.lesson-about,.lookup{-webkit-user-select:text;user-select:text;-webkit-touch-callout:default;cursor:text}
::selection{background:#bbdefb;color:#1c1c2e}
.view{display:none;animation:fadeIn .3s ease}.view.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes popIn{0%{opacity:0;transform:translateY(16px) scale(.92)}100%{opacity:1;transform:translateY(0) scale(1)}}
@keyframes shake{10%,90%{transform:translate3d(-2px,0,0)}20%,80%{transform:translate3d(4px,0,0)}30%,50%,70%{transform:translate3d(-8px,0,0)}40%,60%{transform:translate3d(8px,0,0)}}

/* ── STAGGERED ENTRANCE (cards appear one-by-one) ── */
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.stagger{animation:slideUp .5s var(--spring) both}
.stagger-1{animation-delay:.05s}.stagger-2{animation-delay:.1s}.stagger-3{animation-delay:.15s}
.stagger-4{animation-delay:.2s}.stagger-5{animation-delay:.25s}.stagger-6{animation-delay:.3s}
.stagger-7{animation-delay:.35s}.stagger-8{animation-delay:.4s}

/* ── 3D PRESS DEPTH (all tappable elements) ── */
.tile,.lesson-card,.prac-card,.level-card,.mock-tile,.strengthen-tile{transition:transform .15s var(--spring),box-shadow .15s ease}
.tile:active,.lesson-card:active,.prac-card:active,.level-card:active,.mock-tile:active,.strengthen-tile:active{transform:scale(.96) translateY(2px);box-shadow:0 1px 4px rgba(0,0,0,.08)}

/* ── BREATHING PULSE (continue card draws attention) ── */
@keyframes breathe{0%,100%{box-shadow:var(--shadow),0 0 0 0 rgba(41,121,255,0)}50%{box-shadow:var(--shadow),0 0 20px 4px rgba(41,121,255,.15)}}
.continue-card{animation:breathe 3s ease-in-out infinite}

/* ── ANIMATED GRADIENT MESH HERO BG ── */
@keyframes meshShift{0%,100%{background-position:0% 50%,100% 50%}50%{background-position:100% 50%,0% 50%}}
.hero{background:linear-gradient(160deg,#1c1c2e 0%,#252548 60%,#1d2a5a 100%),radial-gradient(circle at 20% 80%,rgba(41,121,255,.08),transparent 50%),radial-gradient(circle at 80% 20%,rgba(142,36,170,.06),transparent 50%);background-size:100% 100%,200% 200%,200% 200%;animation:meshShift 12s ease-in-out infinite;will-change:background-position}

/* ── SKELETON SHIMMER (loading placeholders) ── */
@keyframes skeleton{0%{background-position:-200% 0}100%{background-position:200% 0}}
.skeleton{background:linear-gradient(90deg,var(--border) 25%,var(--bg) 50%,var(--border) 75%);background-size:200% 100%;animation:skeleton 1.5s infinite;border-radius:12px}
.skeleton-line{height:14px;margin-bottom:8px;border-radius:7px}
.skeleton-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:1.3rem;box-shadow:var(--shadow);margin-bottom:.8rem}

/* ── ACHIEVEMENT TOAST (bottom popup, like SNS apps) ── */
@keyframes toastIn{from{opacity:0;transform:translateY(60px) scale(.9)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes toastOut{to{opacity:0;transform:translateY(60px) scale(.9)}}
.ach-toast{position:fixed;bottom:calc(env(safe-area-inset-bottom) + 72px);left:50%;transform:translateX(-50%);z-index:90;background:var(--ink);color:#fff;border-radius:18px;padding:14px 22px;box-shadow:0 8px 32px rgba(0,0,0,.25);display:flex;align-items:center;gap:12px;max-width:90vw;animation:toastIn .4s var(--spring) both}
.ach-toast.out{animation:toastOut .3s ease both}
.ach-toast .at-icon{font-size:28px;flex-shrink:0}
.ach-toast .at-body{flex:1;min-width:0}
.ach-toast .at-title{font-size:14px;font-weight:900;line-height:1.2}
.ach-toast .at-sub{font-size:12px;color:rgba(255,255,255,.6);font-weight:600;margin-top:2px}

/* ── XP FLOAT (floating +N when gaining XP) ── */
@keyframes xpFloat{0%{opacity:0;transform:translateY(0) scale(.5)}20%{opacity:1;transform:translateY(-10px) scale(1.1)}100%{opacity:0;transform:translateY(-50px) scale(1)}}
.xp-float{position:fixed;z-index:95;font-size:20px;font-weight:900;color:#ffd84d;text-shadow:0 2px 8px rgba(255,216,77,.4);pointer-events:none;animation:xpFloat 1.2s ease-out forwards}

/* ── BOTTOM NAV ACTIVE INDICATOR (animated pill) ── */
.bn-item{position:relative;overflow:visible}
.bn-item.active::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:32px;height:3px;border-radius:2px;background:var(--blue);animation:bnSlide .3s var(--spring)}
@keyframes bnSlide{from{width:0;opacity:0}to{width:32px;opacity:1}}
.bn-item .bn-ico{transition:transform .2s var(--spring)}
.bn-item.active .bn-ico{transform:scale(1.15) translateY(-2px)}

/* ── STREAK MILESTONE BURST ── */
@keyframes streakBurst{0%{transform:scale(1);filter:drop-shadow(0 0 6px rgba(255,100,0,.4))}30%{transform:scale(1.4) rotate(10deg);filter:drop-shadow(0 0 20px rgba(255,200,0,.8))}60%{transform:scale(1.2) rotate(-5deg)}100%{transform:scale(1);filter:drop-shadow(0 0 6px rgba(255,100,0,.4))}}
.streak-fire.burst{animation:streakBurst 1s ease-out}

/* ── TILE SHINE SWEEP (subtle, like Apple icons) ── */
@keyframes shine{0%{left:-100%}100%{left:200%}}
.tile.wide,.mock-tile,.continue-card{position:relative;overflow:hidden}
.tile.wide::before,.mock-tile::before{content:'';position:absolute;top:0;left:-100%;width:60%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.06),transparent);pointer-events:none;animation:shine 4s ease-in-out infinite;animation-delay:var(--shine-delay,0s)}

/* ── COUNT-UP NUMBER (tabular nums, smooth) ── */
.count-up{display:inline-block;font-variant-numeric:tabular-nums}

/* ── PROGRESS RING FILL (smooth dash animation) ── */
.today-goal-ring .fg{transition:stroke-dashoffset 1.2s var(--spring)}

/* ── SECTION HEADER REVEAL ── */
.sect{animation:slideUp .4s var(--spring) both}

/* ── HOVER GLOW ON BADGE CELLS ── */
.badge-cell.earned{transition:transform .2s var(--spring),box-shadow .2s ease}
.badge-cell.earned:active{transform:scale(.9)}

/* ── JOURNEY NODE STAGGER ── */
.j-node{animation:slideUp .3s var(--spring) both}
.j-node:nth-child(1){animation-delay:.02s}.j-node:nth-child(2){animation-delay:.04s}
.j-node:nth-child(3){animation-delay:.06s}.j-node:nth-child(4){animation-delay:.08s}
.j-node:nth-child(5){animation-delay:.1s}.j-node:nth-child(6){animation-delay:.12s}

/* ── HERO (dopamine-first, clean, emotional) ── */
.hero{color:#fff;padding:calc(env(safe-area-inset-top) + 1.6rem) 1.25rem 1.8rem;border-radius:0 0 28px 28px;position:relative;overflow:hidden;box-shadow:var(--shadow)}
.hero::after{content:'道';position:absolute;right:-14px;top:-20px;font-size:150px;font-family:'Noto Sans JP';font-weight:900;color:rgba(255,255,255,.04);line-height:1;pointer-events:none}
.hero-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.hero-greeting{font-size:22px;font-weight:900;line-height:1.2}
.hero-greeting .hg-wave{display:inline-block;animation:wave 2.5s ease-in-out infinite;transform-origin:70% 70%}
@keyframes wave{0%,100%{transform:rotate(0)}20%{transform:rotate(14deg)}40%{transform:rotate(-8deg)}60%{transform:rotate(14deg)}80%{transform:rotate(-4deg)}}
.hero-date{font-size:11px;color:rgba(255,255,255,.4);font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-top:2px}
.hero-gear{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);border-radius:50%;width:40px;height:40px;display:flex;align-items:center;justify-content:center;font-size:17px;cursor:pointer;flex-shrink:0;transition:transform .3s var(--spring);color:rgba(255,255,255,.6)}
.hero-gear:active{transform:rotate(90deg) scale(.9)}
.hero-gear.active{color:#69f0ae}
/* streak flame */
.streak-flame{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.streak-fire{font-size:28px;line-height:1;animation:flicker 1.8s ease-in-out infinite;filter:drop-shadow(0 0 6px rgba(255,100,0,.4))}
@keyframes flicker{0%,100%{transform:scale(1) rotate(-2deg)}50%{transform:scale(1.08) rotate(2deg)}}
.streak-fire.cold{filter:none;opacity:.5;animation:none}
.streak-info{display:flex;flex-direction:column}
.streak-count{font-size:20px;font-weight:900;line-height:1}
.streak-label{font-size:10px;color:rgba(255,255,255,.45);font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-top:2px}
.streak-freeze{font-size:11px;color:#8ec5ff;font-weight:700;margin-left:8px}
/* compact stat row */
.hero-stats{display:flex;gap:8px;margin-bottom:12px}
.hero-stat{flex:1;background:rgba(255,255,255,.06);border-radius:12px;padding:9px 10px;text-align:center}
.hero-stat .hs-v{font-size:18px;font-weight:900;line-height:1}
.hero-stat .hs-l{font-size:9px;color:rgba(255,255,255,.45);font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-top:3px}
.hero-stat.xp .hs-v{color:#ffd84d}
.hero-stat.mastery .hs-v{color:#69f0ae}
/* XP bar (simplified) */
.xp-bar-wrap{margin-top:0;margin-bottom:12px}
.xp-bar{height:6px;background:rgba(255,255,255,.1);border-radius:3px;overflow:hidden}
.xp-bar .f{height:100%;background:linear-gradient(90deg,#ffd84d,#ff9800,#ff5722);border-radius:3px;transition:width 1.2s var(--spring);position:relative}
.xp-bar .f::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.3),transparent);animation:shimmer 2s infinite}
@keyframes shimmer{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
.xp-info{display:flex;justify-content:space-between;font-size:10px;color:rgba(255,255,255,.4);font-weight:700;margin-top:4px;text-transform:uppercase;letter-spacing:.04em}
/* daily goal + momentum combined bar */
.today-bar{display:flex;align-items:center;gap:12px;background:rgba(255,255,255,.06);border-radius:14px;padding:10px 14px}
.today-goal-ring{position:relative;width:42px;height:42px;flex-shrink:0}
.today-goal-ring svg{transform:rotate(-90deg)}
.today-goal-ring .bg{fill:none;stroke:rgba(255,255,255,.1);stroke-width:4}
.today-goal-ring .fg{fill:none;stroke:#69f0ae;stroke-width:4;stroke-linecap:round;transition:stroke-dashoffset 1s var(--spring)}
.today-goal-ring .check{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:16px}
.today-info{flex:1;min-width:0}
.today-label{font-size:11px;color:rgba(255,255,255,.5);font-weight:700;text-transform:uppercase;letter-spacing:.05em}
.today-detail{font-size:14px;font-weight:800;margin-top:1px}
.today-detail.done{color:#69f0ae}
.momentum-pill{display:inline-flex;align-items:center;gap:5px;background:rgba(255,179,0,.15);border:1px solid rgba(255,179,0,.25);border-radius:20px;padding:4px 10px;font-size:12px;font-weight:800;color:#ffca28;flex-shrink:0}
.momentum-pill.hot{animation:pulse 2s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(255,179,0,.4)}70%{box-shadow:0 0 0 9px rgba(255,179,0,0)}100%{box-shadow:0 0 0 0 rgba(255,179,0,0)}}
/* settings dropdown (hidden by default) */
.settings-dropdown{display:none;flex-wrap:wrap;gap:8px;margin-top:10px;padding-top:10px;border-top:1px solid rgba(255,255,255,.08);animation:fadeIn .3s ease}
.settings-dropdown.show{display:flex}
.settings-btn{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:20px;padding:6px 14px;font-size:12px;font-weight:800;color:rgba(255,255,255,.7);cursor:pointer}
.settings-btn.active{background:rgba(105,240,174,.15);border-color:rgba(105,240,174,.3);color:#69f0ae}
/* notification settings */
.notif-section{margin-top:10px;padding-top:10px;border-top:1px solid rgba(255,255,255,.08)}
.notif-title{font-size:11px;color:rgba(255,255,255,.5);font-weight:800;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.notif-toggle{display:flex;align-items:center;justify-content:space-between;padding:8px 0;font-size:13px;font-weight:700;color:rgba(255,255,255,.8)}
.notif-switch{width:44px;height:26px;border-radius:13px;background:rgba(255,255,255,.12);position:relative;cursor:pointer;transition:background .3s;flex-shrink:0}
.notif-switch.on{background:#69f0ae}
.notif-switch .ns-knob{position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:#fff;transition:transform .3s var(--spring)}
.notif-switch.on .ns-knob{transform:translateX(18px)}
.notif-time{display:flex;align-items:center;gap:8px;margin-top:6px}
.notif-time input{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:10px;padding:6px 10px;font-size:13px;color:#fff;font-family:inherit}
.notif-time label{font-size:12px;color:rgba(255,255,255,.5);font-weight:700}
.notif-permit-btn{margin-top:8px;width:100%;padding:10px;background:rgba(41,121,255,.2);border:1px solid rgba(41,121,255,.3);border-radius:12px;color:#bbdefb;font-size:13px;font-weight:800;cursor:pointer}
/* exam countdown (simplified, subtle) */
.exam-countdown{display:flex;align-items:center;justify-content:center;gap:6px;background:rgba(255,255,255,.06);border-radius:10px;padding:6px 10px;margin-bottom:12px;cursor:pointer;font-weight:700;font-size:12px}
.exam-countdown .ec-days{font-size:15px;color:#ffd84d}
.exam-countdown .ec-label{font-size:10px;color:rgba(255,255,255,.5);font-weight:600}

.body{max-width:640px;margin:0 auto;padding:1.4rem 1rem 5rem}
.sect{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.09em;color:var(--ink3);margin:1.5rem 0 .7rem;padding-left:4px}

/* ── MISSION (story-ring) ── */
.mission-ring{position:relative;padding:4px;border-radius:24px;background:linear-gradient(45deg,#ffb300,#ff4b4b,#8e24aa,#2979ff);background-size:300% 300%;animation:spin 4s ease infinite;box-shadow:0 8px 24px rgba(255,75,75,.22);transition:transform .2s var(--spring)}
.mission-ring:active{transform:scale(.97)}
.mission-ring.done{background:var(--border);animation:none;box-shadow:none;opacity:.85}
@keyframes spin{0%{background-position:0 50%}50%{background-position:100% 50%}100%{background-position:0 50%}}
.mission{background:var(--ink);border-radius:20px;padding:1.6rem 1.4rem;cursor:pointer;position:relative;overflow:hidden}
.mission::before{content:'今日';position:absolute;right:-10px;top:-12px;font-family:'Noto Sans JP';font-size:96px;font-weight:900;color:rgba(255,255,255,.04);pointer-events:none}
.mission-ring.done .mission{background:var(--card);border:1px solid var(--border)}
.m-label{font-size:11px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);margin-bottom:6px}
.mission-ring.done .m-label{color:var(--green)}
.m-title{font-size:22px;font-weight:900;color:#fff;margin-bottom:5px;letter-spacing:-.01em}
.mission-ring.done .m-title{color:var(--ink)}
.m-sub{font-size:13.5px;color:rgba(255,255,255,.6);margin-bottom:1.1rem}
.mission-ring.done .m-sub{color:var(--ink3)}
.m-pills{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:1.3rem}
.m-pill{font-size:11px;padding:4px 11px;border-radius:20px;font-weight:800}
.m-pill.focus{background:rgba(255,179,0,.2);color:#ffe082}
.m-pill.b{background:rgba(41,121,255,.2);color:#bbdefb}
.m-cta{background:#fff;color:var(--ink);border:none;border-radius:14px;padding:12px 24px;font-size:15px;font-weight:900;cursor:pointer;width:100%;box-shadow:0 4px 12px rgba(0,0,0,.1)}

/* ── STORY CARD ── */
.story-card{background:linear-gradient(135deg,#1d3a8a,#2979ff);color:#fff;border-radius:var(--r);padding:1.3rem 1.4rem;margin-top:1rem;cursor:pointer;position:relative;overflow:hidden;box-shadow:var(--shadow);transition:transform .2s var(--spring)}
.story-card:active{transform:scale(.97)}
.story-card::after{content:'本';position:absolute;right:-8px;bottom:-22px;font-family:'Noto Sans JP';font-size:96px;font-weight:900;color:rgba(255,255,255,.08)}
.story-eyebrow{font-size:11px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.7);margin-bottom:6px}
.story-title{font-size:19px;font-weight:800;font-family:'Noto Sans JP';margin-bottom:8px}
.story-meta{font-size:12.5px;color:rgba(255,255,255,.75);font-weight:600}

/* ── MASTERY PANEL ── */
.panel{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:1.4rem;box-shadow:var(--shadow)}
.dim-row{margin-bottom:15px}.dim-row:last-child{margin-bottom:0}
.dim-top{display:flex;justify-content:space-between;font-weight:800;font-size:14px;margin-bottom:5px}
.track{height:9px;background:var(--bg);border-radius:5px;overflow:hidden}
.fill{height:100%;border-radius:5px;transition:width 1s var(--spring)}
.retention-note{font-size:12px;color:var(--ink3);margin-top:12px;text-align:center;font-weight:600}

/* ── PRACTICE GRID ── */
.grid{display:grid;grid-template-columns:1fr 1fr;gap:.7rem}
.tile{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:1.15rem 1rem;cursor:pointer;text-align:center;box-shadow:var(--shadow);transition:transform .2s var(--spring)}
.tile:active{transform:scale(.93)}
.tile.wide{grid-column:1/-1;display:flex;align-items:center;gap:1.1rem;text-align:left}
.t-icon{font-size:28px;filter:drop-shadow(0 4px 8px rgba(0,0,0,.1))}
.t-name{font-size:15px;font-weight:800;letter-spacing:-.01em}
.t-sub{font-size:12px;color:var(--ink3);font-weight:600}

/* ── SESSION HEADER (focus-optimized) ── */
.shead{background:rgba(255,255,255,.85);backdrop-filter:blur(20px) saturate(180%);-webkit-backdrop-filter:blur(20px) saturate(180%);border-bottom:1px solid var(--border);padding:calc(env(safe-area-inset-top) + .8rem) 1.2rem .8rem;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:50;transition:box-shadow .3s}
.shead.focus{box-shadow:0 1px 0 var(--border),0 0 24px rgba(41,121,255,.06)}
.sback{background:var(--bg);border:none;cursor:pointer;font-size:18px;color:var(--ink2);width:38px;height:38px;border-radius:50%;font-weight:700;display:flex;align-items:center;justify-content:center;transition:transform .15s var(--spring);flex-shrink:0}
.sback:active{transform:scale(.88)}
.sbar-wrap{flex:1}.sbar{height:8px;background:var(--border);border-radius:4px;overflow:hidden;position:relative}
.sbar-fill{height:100%;background:linear-gradient(90deg,var(--green),#69f0ae);border-radius:4px;transition:width .5s var(--spring);position:relative}
.sbar-fill::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.4),transparent);animation:shimmer 2s infinite}
.s-meta{font-size:13px;font-weight:900;color:var(--ink2);min-width:48px;text-align:right;font-variant-numeric:tabular-nums}
.s-focus-indicator{display:flex;align-items:center;gap:6px;padding:4px 10px;background:rgba(41,121,255,.08);border-radius:20px;font-size:11px;font-weight:800;color:var(--blue);margin-left:4px;flex-shrink:0;opacity:0;transition:opacity .5s}
.s-focus-indicator.active{opacity:1}
.s-focus-indicator .sfi-dot{width:7px;height:7px;border-radius:50%;background:var(--blue);animation:focusPulse 2s ease-in-out infinite}
@keyframes focusPulse{0%,100%{transform:scale(1);opacity:.5}50%{transform:scale(1.4);opacity:1}}
body.dark .shead{background:rgba(26,26,46,.85)}
body.dark .sback{background:var(--bg)}

/* ── QUIZ / CARDS (focus-optimized, larger Japanese) ── */
.q-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:1.8rem 1.7rem;margin-bottom:1rem;box-shadow:var(--shadow);animation:cardSlide .4s var(--spring) both;position:relative}
@keyframes cardSlide{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.q-sentence{font-family:'Noto Sans JP';font-size:22px;font-weight:500;line-height:1.7;margin-bottom:10px;letter-spacing:.01em}
.q-ask{font-size:14px;color:var(--ink2);font-weight:700;margin-bottom:20px}
.opts{display:grid;gap:10px}
.opt{padding:16px 20px;border:2px solid var(--border);border-radius:16px;background:var(--card);color:var(--ink);font-size:17px;font-weight:700;font-family:'Noto Sans JP';cursor:pointer;text-align:left;transition:transform .15s var(--spring),border-color .2s,background .2s;position:relative;overflow:hidden;min-height:52px;display:flex;align-items:center}
.opt:active:not(:disabled){transform:scale(.96);background:var(--bg)}
.opt::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:transparent;transition:background .2s}
.opt:not(:disabled):hover{border-color:var(--blue)}
.opt:not(:disabled):hover::before{background:var(--blue)}
.opt.correct{background:var(--green);border-color:var(--green);color:#fff;animation:correctPulse .5s var(--spring)}
.opt.correct::before{background:#fff}
@keyframes correctPulse{0%{transform:scale(1)}30%{transform:scale(1.03)}100%{transform:scale(1)}}
.opt.wrong{background:var(--red);border-color:var(--red);color:#fff;animation:shake .4s both}
.opt.sel{background:var(--blue-soft);border-color:var(--blue);color:var(--blue)}
.feedback{margin-top:16px;font-size:14px;font-weight:600;padding:14px 16px;border-radius:14px;line-height:1.55;animation:fadeIn .3s}
.feedback.ok{background:var(--green-soft);color:#008738;border-left:4px solid var(--green)}
.feedback.err{background:var(--red-soft);color:#d32f2f;border-left:4px solid var(--red)}
.next-btn{width:100%;padding:16px;background:var(--ink);color:#fff;border:none;border-radius:16px;font-size:17px;font-weight:900;cursor:pointer;margin-top:16px;display:none;transition:transform .15s var(--spring)}
.next-btn:active{transform:scale(.97)}
.next-btn.show{display:block;animation:popIn .35s var(--spring)}

/* memory strength bar (SRS transparency) */
.mem-bar{display:flex;align-items:center;gap:8px;margin-top:12px;padding-top:12px;border-top:1px solid var(--border);font-size:11px;color:var(--ink3);font-weight:700}
.mem-bar .mb-label{flex-shrink:0;text-transform:uppercase;letter-spacing:.04em}
.mem-bar .mb-track{flex:1;height:5px;background:var(--bg);border-radius:3px;overflow:hidden}
.mem-bar .mb-fill{height:100%;border-radius:3px;transition:width .8s var(--spring)}
.mem-bar .mb-stage{font-size:10px;font-weight:900;padding:2px 8px;border-radius:10px;flex-shrink:0}
.mb-stage.new{background:var(--blue-soft);color:var(--blue)}
.mb-stage.learning{background:var(--gold-soft);color:var(--gold)}
.mb-stage.young{background:#e8f5e9;color:#2e7d32}
.mb-stage.mature{background:var(--green-soft);color:var(--green)}

/* teaching cards (larger Japanese, better spacing) */
.teach{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:1.8rem 1.7rem;box-shadow:var(--shadow);text-align:center}
.teach .big{font-family:'Noto Sans JP';font-size:48px;font-weight:900;margin-bottom:8px;letter-spacing:.02em}
.teach .read{font-size:19px;color:var(--ink2);font-weight:700;margin-bottom:4px}
.teach .mean{font-size:19px;color:var(--blue);font-weight:800;margin-bottom:16px}
.teach .ex{font-family:'Noto Sans JP';font-size:17px;background:var(--bg);border-radius:14px;padding:14px 16px;line-height:1.7;text-align:left}
.teach .exm{font-size:13px;color:var(--ink3);margin-top:8px;text-align:left}
.teach ul{text-align:left;margin:12px 0 0;padding-left:1.1rem}
.teach li{font-family:'Noto Sans JP';font-size:16px;line-height:1.8;margin-bottom:4px}
.listen-btn{display:inline-flex;align-items:center;gap:8px;background:var(--blue-soft);color:var(--blue);border:none;border-radius:24px;padding:9px 18px;font-weight:800;font-size:14px;cursor:pointer;margin-top:14px}
.listen-btn:active{transform:scale(.94)}

/* flashcards (larger Japanese) */
.fc-scene{perspective:1000px;margin-bottom:1.4rem;cursor:pointer}

/* Flashcard Hub */
.fh-section{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:1rem 1.1rem;margin-bottom:.7rem;box-shadow:var(--shadow)}
.fh-section-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.fh-section-title{font-size:15px;font-weight:900;font-family:'Noto Sans JP'}
.fh-section-count{font-size:11px;font-weight:800;color:var(--ink3);background:var(--bg);padding:3px 9px;border-radius:20px}
.fh-tabs{display:flex;gap:5px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding:6px 0 8px;position:sticky;top:calc(env(safe-area-inset-top) + 52px);z-index:8;background:var(--bg)}
.fh-tab{white-space:nowrap;padding:6px 13px;border-radius:18px;background:var(--card);border:1.5px solid var(--border);color:var(--ink3);font-size:12.5px;font-weight:700;cursor:pointer;transition:all .2s;flex-shrink:0}
.fh-tab:active{transform:scale(.94)}
.fh-tab.active{background:var(--blue);color:#fff;border-color:var(--blue)}
.fh-tab.active.n5{background:var(--green);border-color:var(--green)}
.fh-tab.active.n4{background:var(--blue);border-color:var(--blue)}
.fh-tab.active.n3{background:var(--purple);border-color:var(--purple)}
.fh-filter-row{display:flex;align-items:center;gap:5px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding:3px 0 6px}
.fh-filter-label{font-size:10px;font-weight:800;color:var(--ink3);white-space:nowrap;flex-shrink:0;min-width:38px;text-transform:uppercase;letter-spacing:.3px}
.fh-summary{display:flex;gap:6px;margin:8px 0}
.fh-stat{flex:1;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:7px 8px;text-align:center}
.fh-stat-num{font-size:18px;font-weight:900;color:var(--ink)}
.fh-stat-label{font-size:9px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.5px}
.fh-start-btn{width:100%;padding:12px;background:var(--blue);color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:900;cursor:pointer;margin-top:6px;box-shadow:0 3px 0 #1565c0;transition:transform .15s var(--spring)}
.fh-start-btn:active{transform:translateY(3px);box-shadow:0 1px 0 #1565c0}
.fh-start-btn.green{background:var(--green);box-shadow:0 3px 0 #00a344}
.fh-start-btn.green:active{box-shadow:0 1px 0 #00a344}
.fh-start-btn.purple{background:var(--purple);box-shadow:0 3px 0 #6a1b9a}
.fh-start-btn.purple:active{box-shadow:0 1px 0 #6a1b9a}
.fh-progress-mini{display:flex;gap:3px;flex-wrap:wrap;margin:6px 0 8px}
.fh-pm-dot{width:8px;height:8px;border-radius:50%;background:var(--border);flex-shrink:0}
.fh-pm-dot.learned{background:var(--blue)}
.fh-pm-dot.mastered{background:var(--green)}
.fc-inner{position:relative;width:100%;min-height:320px;transition:transform .6s var(--spring);transform-style:preserve-3d}
.fc-inner.flip{transform:rotateY(180deg)}
.fc-face{position:absolute;inset:0;background:var(--card);border:2px solid var(--border);border-radius:24px;padding:2rem;display:flex;flex-direction:column;align-items:center;justify-content:center;backface-visibility:hidden;box-shadow:var(--shadow);text-align:center}
.fc-back{transform:rotateY(180deg)}
.fc-big{font-family:'Noto Sans JP';font-size:48px;font-weight:900;margin-bottom:12px;letter-spacing:.01em}
.rate-row{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;animation:popIn .3s}
.rate{padding:13px 6px;border:none;border-radius:14px;font-size:13px;font-weight:900;cursor:pointer;box-shadow:0 4px 0 rgba(0,0,0,.1)}
.rate:active{transform:translateY(4px);box-shadow:0 0 0 rgba(0,0,0,0)}
.r1{background:#ffcdd2;color:#c62828}.r2{background:#ffe0b2;color:#ef6c00}.r3{background:#c8e6c9;color:#2e7d32}.r4{background:#bbdefb;color:#1565c0}

/* production recall (mission recall step) — larger, more readable */
.recall-eyebrow{text-align:center;font-size:12px;font-weight:800;color:var(--ink3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:1rem}
.recall-cuelabel{font-size:12px;font-weight:800;color:var(--ink3);text-transform:uppercase;letter-spacing:.08em;text-align:center;margin-bottom:12px}
.recall-cue{font-family:'Noto Sans JP';font-size:32px;font-weight:900;text-align:center;line-height:1.45;margin-bottom:8px;letter-spacing:.01em}
.recall-direction{font-size:11px;font-weight:800;color:var(--blue);text-align:center;margin-bottom:6px;letter-spacing:.05em}
.recall-answer{border-top:1px dashed var(--border);margin-top:18px;padding-top:18px;text-align:center;animation:revealAnswer .4s var(--spring)}
@keyframes revealAnswer{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
.recall-main{font-family:'Inter','Noto Sans JP',sans-serif;font-size:36px;font-weight:900;margin-bottom:6px;letter-spacing:-.01em}
.recall-reading{font-size:19px;color:var(--ink2);font-weight:700;line-height:1.6}
.recall-ex{font-family:'Noto Sans JP';font-size:17px;background:var(--bg);border-radius:14px;padding:14px 16px;line-height:1.7;text-align:left;margin-top:14px}
.recall-exm{font-size:13px;color:var(--ink3);margin-top:8px;text-align:left}
.recall-eglist{text-align:left;margin:8px 0 0;padding-left:1.1rem}
.recall-eglist li{font-family:'Noto Sans JP';font-size:16px;line-height:1.8;margin-bottom:4px}
.reveal-btn{width:100%;padding:16px;background:var(--ink);color:#fff;border:none;border-radius:16px;font-size:17px;font-weight:900;cursor:pointer;margin-top:18px;transition:transform .15s var(--spring)}
.reveal-btn:active{transform:scale(.97)}
.fc-cue{font-family:'Noto Sans JP';font-size:32px;font-weight:900;color:var(--ink);line-height:1.45;letter-spacing:.01em}
.fc-grammar-back{font-size:17px;color:var(--ink2);font-weight:700;line-height:1.65;text-align:center}

/* reading center — larger, more readable */
.passage{font-family:'Noto Sans JP';font-size:20px;line-height:2.1;background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:1.8rem;box-shadow:var(--shadow);margin-bottom:1rem;letter-spacing:.01em}
.read-tools{display:flex;gap:10px;margin-bottom:1rem}
.read-tools button{flex:1;padding:13px;border:none;border-radius:14px;font-weight:800;font-size:14px;cursor:pointer}
.rt-listen{background:var(--blue);color:#fff}.rt-start{background:var(--ink);color:#fff}

.particle{position:absolute;font-weight:900;font-size:24px;pointer-events:none;z-index:100;animation:floatUp .8s var(--spring) forwards;text-shadow:0 2px 8px rgba(0,0,0,.15)}
@keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(.5)}50%{transform:translateY(-30px) scale(1.2)}100%{opacity:0;transform:translateY(-52px) scale(1)}}
#confetti{position:fixed;inset:0;pointer-events:none;z-index:9999}
.admin-link{text-align:center;padding:40px 0 30px}
.admin-link a{text-decoration:none;font-size:16px;opacity:.35;color:var(--ink2);transition:opacity .3s;cursor:pointer}
.admin-link a:active{opacity:1}

/* ===================== LESSON CURRICULUM UI ===================== */
/* difficulty badges (easy / medium / hard) — used on lesson cards AND on each question */
.diff-badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:900;padding:3px 9px;border-radius:20px;letter-spacing:.02em;white-space:nowrap}
.diff-easy{background:var(--green-soft);color:#1b8a4b}
.diff-medium{background:var(--gold-soft);color:#b26a00}
.diff-hard{background:var(--red-soft);color:#d32f2f}
.diff-dot{width:7px;height:7px;border-radius:50%}
.diff-easy .diff-dot{background:#1b8a4b}.diff-medium .diff-dot{background:#e69500}.diff-hard .diff-dot{background:#e53935}

/* old prog-strip removed — replaced by hero-stats */

/* continue card */
.continue-card{background:linear-gradient(135deg,#1d3a8a,#2979ff);color:#fff;border-radius:var(--r);padding:1.3rem 1.4rem;cursor:pointer;box-shadow:var(--shadow);transition:transform .2s var(--spring);position:relative;overflow:hidden}
.continue-card:active{transform:scale(.98)}
.continue-card::after{content:'続';position:absolute;right:-6px;bottom:-20px;font-family:'Noto Sans JP';font-size:88px;font-weight:900;color:rgba(255,255,255,.1)}
.cc-eyebrow{font-size:11px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.7);margin-bottom:6px}
.cc-title{font-size:20px;font-weight:900;font-family:'Noto Sans JP';margin-bottom:4px}
.cc-sub{font-size:12.5px;color:rgba(255,255,255,.8);font-weight:600}
.cc-progress{display:flex;align-items:center;gap:10px;margin-top:12px}
.cc-dots{display:flex;gap:5px;flex:1}
.cc-dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.2)}
.cc-dot.done{background:#69f0ae}
.cc-dot.current{background:#ffd84d;box-shadow:0 0 6px rgba(255,216,77,.6)}
.cc-cta{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.2);border-radius:12px;padding:8px 16px;font-size:13px;font-weight:900;color:#fff;flex-shrink:0}

/* ── COACH WHISPER (enhanced, more engaging) ── */
.coach-whisper{background:linear-gradient(135deg,var(--card),var(--blue-soft));border:1px solid var(--border);border-radius:18px;padding:16px 18px;margin-bottom:.8rem;display:flex;gap:14px;align-items:flex-start;box-shadow:var(--shadow);position:relative;overflow:hidden}
.coach-whisper::after{content:'';position:absolute;top:0;right:0;width:80px;height:80px;background:radial-gradient(circle,rgba(41,121,255,.06),transparent 70%);border-radius:50%}
.coach-avatar{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,#ff9800,#ff5722);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;box-shadow:0 4px 12px rgba(255,87,34,.2);animation:emojiPop .6s var(--spring) .2s both;position:relative}
.coach-text{flex:1;font-size:14px;line-height:1.55;color:var(--ink);position:relative}
.coach-text .ct-emoji{margin-right:4px}
.coach-text strong{font-weight:900}
body.dark .coach-whisper{background:linear-gradient(135deg,var(--card),rgba(67,97,238,.05))}

/* lesson list */
.lesson-card{display:flex;align-items:center;gap:14px;background:var(--card);border:1px solid var(--border);border-radius:18px;padding:1rem 1.1rem;margin-bottom:.7rem;cursor:pointer;box-shadow:var(--shadow);transition:transform .15s var(--spring)}
.lesson-card:active{transform:scale(.98)}
.lesson-card.locked{opacity:.62}
.lc-num{flex-shrink:0;width:46px;height:46px;border-radius:14px;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;font-weight:900}
.lc-num .n{font-size:18px;line-height:1}.lc-num .l{font-size:9px;color:var(--ink3);font-weight:800}
.lc-body{flex:1;min-width:0}
.lc-topic{font-family:'Noto Sans JP';font-size:16px;font-weight:800;margin-bottom:2px}
.lc-en{font-size:12.5px;color:var(--ink3);font-weight:600;margin-bottom:7px}
.lc-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.lc-prog{height:6px;background:var(--bg);border-radius:3px;overflow:hidden;flex:1;min-width:60px}
.lc-prog .f{height:100%;background:var(--green);border-radius:3px;transition:width .6s var(--spring)}
.lc-check{color:var(--green);font-weight:900;font-size:16px}
.lc-lock{font-size:15px;opacity:.6}

/* lesson detail */
.lesson-head{background:var(--ink);color:#fff;padding:1.6rem 1.25rem 1.4rem;border-radius:0 0 26px 26px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.lesson-head::after{content:attr(data-kanji);position:absolute;right:-10px;top:-30px;font-size:150px;font-family:'Noto Sans JP';font-weight:900;color:rgba(255,255,255,.05);line-height:1;pointer-events:none}
.lh-top{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.lh-back{background:rgba(255,255,255,.12);border:none;color:#fff;width:36px;height:36px;border-radius:18px;font-size:18px;font-weight:800;cursor:pointer;flex-shrink:0}
.lh-label{font-size:11px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.5)}
.lh-topic{font-family:'Noto Sans JP';font-size:26px;font-weight:900;margin:4px 0 2px}
.lh-en{font-size:14px;color:rgba(255,255,255,.7);font-weight:600;margin-bottom:14px}
.lh-steps{display:flex;gap:6px}
.lh-step{flex:1;height:6px;border-radius:3px;background:rgba(255,255,255,.15)}
.lh-step.done{background:#69f0ae}

.seg{display:flex;background:var(--bg);border-radius:14px;padding:4px;margin:0 0 1.2rem}
.seg-btn{flex:1;border:none;background:transparent;padding:10px;border-radius:11px;font-weight:800;font-size:14px;color:var(--ink2);cursor:pointer}
.seg-btn.active{background:var(--card);color:var(--ink);box-shadow:var(--shadow)}

.lesson-about{background:var(--blue-soft);border:1px solid #d6e4ff;border-radius:16px;padding:1.1rem 1.2rem;margin-bottom:1rem;line-height:1.6;font-size:14.5px}
.lesson-about h4{font-size:13px;font-weight:900;color:var(--blue);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}

.learn-block{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:1.1rem 1.2rem;margin-bottom:1rem;box-shadow:var(--shadow)}
.lb-h{display:flex;align-items:center;justify-content:space-between;font-size:13px;font-weight:900;text-transform:uppercase;letter-spacing:.05em;color:var(--ink3);margin-bottom:12px}
.vocab-row{display:flex;align-items:center;gap:12px;padding:11px 0;border-top:1px solid var(--border)}
.vocab-row:first-of-type{border-top:none}
.vocab-jp{font-family:'Noto Sans JP';font-size:20px;font-weight:800;letter-spacing:.01em}
.vocab-rd{font-size:13px;color:var(--ink3);font-weight:600}
.vocab-mn{font-size:13.5px;color:var(--blue);font-weight:700}
.vocab-ex{font-family:'Noto Sans JP';font-size:13px;color:var(--ink2);margin-top:3px;line-height:1.5}
.mini-listen{flex-shrink:0;background:var(--blue-soft);color:var(--blue);border:none;width:40px;height:40px;border-radius:12px;font-size:16px;cursor:pointer;transition:transform .15s var(--spring)}
.mini-listen:active{transform:scale(.9)}
.gram-card{border-top:1px solid var(--border);padding-top:14px;margin-top:14px}
.gram-card:first-of-type{border-top:none;padding-top:0;margin-top:0}
.gram-point{font-family:'Noto Sans JP';font-size:19px;font-weight:900;margin-bottom:6px;letter-spacing:.01em}
.gram-exp{font-size:14px;color:var(--ink2);line-height:1.65;margin-bottom:10px}
.gram-ex{font-family:'Noto Sans JP';font-size:15.5px;background:var(--bg);border-radius:12px;padding:10px 14px;margin-bottom:6px;line-height:1.65}
.furi{display:block;font-size:11px;color:var(--ink3);font-weight:600;margin-bottom:2px;letter-spacing:.02em}

/* practice category list */
.prac-card{display:flex;align-items:center;gap:13px;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:1rem 1.1rem;margin-bottom:.7rem;cursor:pointer;box-shadow:var(--shadow);transition:transform .15s var(--spring)}
.prac-card:active{transform:scale(.98)}
.prac-icon{font-size:24px;flex-shrink:0}
.prac-body{flex:1}
.prac-name{font-size:15.5px;font-weight:800;margin-bottom:2px}
.prac-sub{font-size:12px;color:var(--ink3);font-weight:600}
.prac-arrow{color:var(--ink3);font-size:20px;font-weight:800}
.lcta{width:100%;padding:15px;background:var(--green);color:#fff;border:none;border-radius:16px;font-size:16px;font-weight:900;cursor:pointer;margin:.5rem 0 1rem;box-shadow:0 4px 0 #00a344}
.lcta:active{transform:translateY(3px);box-shadow:0 1px 0 #00a344}
.lcta.ghost{background:var(--card);color:var(--ink2);box-shadow:0 4px 0 var(--border);border:1px solid var(--border)}

/* difficulty badge floated on a quiz/recall card */
.q-diff{position:absolute;top:12px;right:12px}
.q-card,.recall-answer{position:relative}
.lookup-hint{font-size:12px;color:var(--ink3);font-weight:600;text-align:center;background:var(--gold-soft);border-radius:12px;padding:8px 12px;margin-bottom:1rem}

/* ===================== JOURNEY MAP (compact 25→50 tracker) ===================== */
.journey{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:.9rem .9rem .8rem;box-shadow:var(--shadow)}
.j-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:8px}
.j-now{font-size:13px;font-weight:900}
.j-count{font-size:11.5px;font-weight:800;color:var(--ink3)}
.j-bar{height:7px;background:var(--bg);border-radius:4px;overflow:hidden;margin-bottom:12px}
.j-bar .f{height:100%;background:linear-gradient(90deg,var(--green),#2979ff);border-radius:4px;transition:width .8s var(--spring)}
.j-grid{display:grid;grid-template-columns:repeat(10,1fr);gap:5px}
.j-sec{margin-bottom:10px}
.j-sec:last-of-type{margin-bottom:0}
.j-sec-h{display:flex;justify-content:space-between;align-items:center;font-size:11px;font-weight:800;color:var(--ink3);margin:0 2px 6px;text-transform:uppercase;letter-spacing:.04em}
.j-sec-c{font-size:10px;font-weight:900;color:var(--ink2);background:var(--bg);border-radius:20px;padding:2px 8px}
.j-node{position:relative;aspect-ratio:1/1;border-radius:10px;background:var(--card);border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:12px;color:var(--ink);cursor:pointer;box-shadow:var(--shadow);transition:transform .12s var(--spring)}
.j-node:active{transform:scale(.9)}
.j-node.done{background:var(--green);color:#fff;border-color:var(--green)}
.j-node.current{border:2px solid var(--blue);color:var(--blue);box-shadow:0 0 0 3px var(--blue-soft);animation:jpulse 2s var(--spring) infinite}
.j-node.locked{background:var(--bg);color:var(--ink3);border-style:dashed;opacity:.65;cursor:default;box-shadow:none}
.j-node .cor{position:absolute;top:1px;right:3px;font-size:8px;font-weight:900}
.j-node .dot{position:absolute;bottom:4px;width:5px;height:5px;border-radius:50%}
@keyframes jpulse{0%,100%{box-shadow:0 0 0 3px var(--blue-soft)}50%{box-shadow:0 0 0 5px var(--blue-soft)}}
.j-legend{display:flex;gap:10px;justify-content:center;margin-top:10px;font-size:10px;color:var(--ink3);font-weight:600;flex-wrap:wrap}
.j-legend span{display:inline-flex;align-items:center;gap:5px}
.j-chip{width:13px;height:13px;border-radius:5px;display:inline-block;flex-shrink:0}
.j-more{font-size:12px;color:var(--blue);text-decoration:none;font-weight:800}

/* ===================== JLPT PHASE ROADMAP ===================== */
.phase-roadmap{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:1rem;box-shadow:var(--shadow);margin-top:.4rem}
.phase-rm-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.phase-rm-title{font-size:14px;font-weight:900}
.phase-rm-sub{font-size:11px;font-weight:700;color:var(--ink3)}
.phase-rm-track{position:relative;padding:8px 0 4px}
.phase-rm-line{position:absolute;top:20px;left:12%;right:12%;height:3px;background:var(--border);border-radius:2px;z-index:0}
.phase-rm-line .fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--purple));border-radius:2px;transition:width .6s var(--spring)}
.phase-rm-steps{display:flex;justify-content:space-between;position:relative;z-index:1}
.phase-step{display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;flex:1;max-width:120px}
.phase-step-dot{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;border:3px solid var(--border);background:var(--card);transition:all .25s var(--spring);position:relative}
.phase-step.active .phase-step-dot{border-color:var(--blue);background:var(--blue);color:#fff;box-shadow:0 0 0 4px var(--blue-soft);animation:jpulse 2.5s var(--spring) infinite}
.phase-step.done .phase-step-dot{border-color:var(--green);background:var(--green);color:#fff}
.phase-step.locked .phase-step-dot{opacity:.45;border-style:dashed}
.phase-step-label{font-size:11px;font-weight:900;text-align:center;line-height:1.3}
.phase-step-date{font-size:9px;font-weight:700;color:var(--ink3);text-align:center}
.phase-step.active .phase-step-label{color:var(--blue)}
.phase-step.done .phase-step-label{color:var(--green)}
.phase-step-pct{font-size:10px;font-weight:800;color:var(--ink3);margin-top:2px}
.phase-step.done .phase-step-pct{color:var(--green)}
.phase-step.active .phase-step-pct{color:var(--blue)}
.phase-rm-detail{margin-top:12px;padding:10px 12px;background:var(--bg);border-radius:12px;font-size:12px;font-weight:600;color:var(--ink2);line-height:1.5;display:flex;align-items:flex-start;gap:8px}
.phase-rm-detail .prd-icon{font-size:20px;flex-shrink:0}
.phase-rm-detail b{color:var(--ink);font-weight:900}

/* ===================== EXAM COUNTDOWN + MOCK TEST ===================== */
.exam-countdown{display:flex;align-items:center;justify-content:center;gap:8px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:13px;padding:8px 12px;margin-bottom:14px;cursor:pointer;font-weight:800}
.exam-countdown .ec-days{font-size:18px;color:#ffd84d}
.exam-countdown .ec-label{font-size:11px;color:rgba(255,255,255,.65);font-weight:700;letter-spacing:.02em}
.mock-tile{display:flex;align-items:center;gap:13px;background:linear-gradient(135deg,#3a1d8a,#6c3fd0);border:1px solid #6c3fd0;border-radius:15px;padding:13px 14px;cursor:pointer;box-shadow:var(--shadow);color:#fff}
.mock-tile:active{transform:scale(.98)}
.mock-tile .mt-ico{font-size:22px}
.mock-tile .mt-name{font-size:15px;font-weight:800}
.mock-tile .mt-sub{font-size:12px;color:rgba(255,255,255,.75);font-weight:600}

/* exam hub */
.exam-hub-head{margin:.2rem 0 1rem}
.exam-hub-title{font-size:20px;font-weight:900}
.exam-hub-sub{font-size:13px;color:var(--ink3);margin-top:4px;font-weight:600;line-height:1.5}
.level-card{display:block;width:100%;text-align:left;background:var(--card);border:1.5px solid var(--border);border-radius:18px;padding:16px;margin-bottom:12px;box-shadow:var(--shadow);cursor:pointer;position:relative}
.level-card:active{transform:scale(.99)}
.level-card.locked{opacity:.6;cursor:not-allowed}
.level-card .lv-row{display:flex;align-items:center;gap:12px}
.level-card .lv-badge{width:46px;height:46px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900;color:#fff;flex-shrink:0}
.lv-A .lv-badge{background:#2bb673}.lv-B .lv-badge{background:#e69500}.lv-C .lv-badge{background:#e53935}
.level-card .lv-name{font-size:16px;font-weight:900}
.level-card .lv-jp{font-size:12.5px;color:var(--ink3);font-weight:700;margin-top:2px}
.level-card .lv-meta{margin-left:auto;text-align:right;flex-shrink:0}
.level-card .lv-best{font-size:13px;font-weight:900}
.level-card .lv-status{font-size:11px;font-weight:800;margin-top:2px}
.lv-pass{color:var(--green)}.lv-lock{color:var(--ink3)}
.level-card .lv-secs{font-size:11.5px;color:var(--ink3);font-weight:600;margin-top:10px;line-height:1.5}

/* exam runner top bar */
.exam-top{position:sticky;top:0;z-index:5;background:var(--bg);border-bottom:1px solid var(--border);padding:10px 16px;display:none}
.exam-top.show{display:block}
.exam-top-row{display:flex;align-items:center;justify-content:space-between;gap:10px}
.exam-quit{background:none;border:none;font-size:18px;color:var(--ink3);cursor:pointer;padding:2px 6px}
.exam-timer{font-size:16px;font-weight:900;font-variant-numeric:tabular-nums;background:var(--card);border:1px solid var(--border);border-radius:20px;padding:4px 12px}
.exam-timer.warn{color:#e53935;border-color:#e53935;animation:jpulse 1s infinite}
.exam-section-pill{font-size:12px;font-weight:800;color:var(--blue)}
.exam-prog{height:6px;background:var(--card);border-radius:3px;overflow:hidden;margin-top:9px}
.exam-prog .f{height:100%;background:linear-gradient(90deg,var(--green),var(--blue));transition:width .3s}
/* exam question */
.exam-sec-head{font-size:13px;font-weight:900;color:var(--ink);margin:.3rem 0 .2rem}
.exam-sec-desc{font-size:12px;color:var(--ink3);font-weight:600;margin-bottom:1rem}
.exam-passage{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px 16px;font-size:15px;line-height:2;margin-bottom:1rem;white-space:pre-line}
.exam-q{font-size:17px;font-weight:700;line-height:1.7;margin-bottom:1rem}
.exam-nav-row{display:flex;gap:10px;margin-top:.5rem}
.exam-prev{flex:0 0 auto;padding:15px 20px;border:2px solid var(--border);border-radius:14px;background:var(--card);color:var(--ink2);font-size:16px;font-weight:800;cursor:pointer}
.exam-prev:disabled{opacity:.3;cursor:not-allowed}
.exam-next{flex:1;padding:15px;border:none;border-radius:14px;background:var(--ink);color:#fff;font-size:16px;font-weight:800;cursor:pointer;margin-top:0}
.exam-next:disabled{opacity:.4;cursor:not-allowed}
.exam-click-guard{pointer-events:none!important}
/* exam result */
.exam-score-ring{width:130px;height:130px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;margin:1rem auto;color:#fff}
.exam-score-ring .pct{font-size:34px;font-weight:900;line-height:1}
.exam-score-ring .lab{font-size:11px;font-weight:800;opacity:.85;margin-top:3px}
.exam-verdict{text-align:center;font-size:18px;font-weight:900;margin-bottom:.3rem}
.exam-breakdown{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin:1rem 0}
.exam-brow{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;border-bottom:1px solid var(--border);font-size:14px}
.exam-brow:last-child{border-bottom:none}
.exam-brow .bn{font-weight:700}.exam-brow .bs{font-weight:900;font-variant-numeric:tabular-nums}
.exam-review-q{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:10px;font-size:14px;line-height:1.6}
.exam-review-q .erv-bad{color:#e53935;font-weight:700}.exam-review-q .erv-good{color:var(--green);font-weight:700}

/* ===================== DARK MODE ===================== */
body.dark{--bg:#1a1a2e;--card:#252542;--ink:#e8e8f0;--ink2:#a0a0c0;--ink3:#6e6e90;--border:#353560;--red-soft:#3a1a1a;--green-soft:#1a2a1a;--blue-soft:#1a1a3a;--gold-soft:#2a2a1a;--purple-soft:#2a1a2a;--shadow:0 4px 12px rgba(0,0,0,.3)}
body.dark .hero{background:linear-gradient(160deg,#0d0d1a 0%,#16162e 60%,#1a1a3a 100%),radial-gradient(circle at 20% 80%,rgba(41,121,255,.06),transparent 50%),radial-gradient(circle at 80% 20%,rgba(142,36,170,.04),transparent 50%);background-size:100% 100%,200% 200%,200% 200%}body.dark .mission{background:#16162a}
body.dark .lesson-head{background:#16162a}body.dark .continue-card{background:linear-gradient(135deg,#1a2a5a,#1a4a9a)}
body.dark .story-card{background:linear-gradient(135deg,#1a2a5a,#1a4a9a)}body.dark .mock-tile{background:linear-gradient(135deg,#2a1a5a,#4a2a90)}
body.dark .opt{background:var(--card)}body.dark .teach{background:var(--card)}
body.dark .exam-prev{background:var(--card);border-color:var(--border);color:var(--ink2)}
body.dark .passage{background:var(--card)}body.dark .fc-face{background:var(--card)}
body.dark .q-card{background:var(--card)}body.dark .panel{background:var(--card)}
body.dark .rate-row .rate{color:#fff}
body.dark ::selection{background:#3a5a8a;color:#fff}
body.dark .shead{background:rgba(37,37,66,.95)}
body.dark .exam-top{background:var(--bg)}
body.dark .seg{background:var(--bg)}
body.dark .seg-btn.active{background:var(--card)}
body.dark .lcta.ghost{background:var(--card)}

/* old XP bar + goal ring CSS replaced by hero redesign above */

/* ===================== COMBO METER ===================== */
.combo-meter{position:fixed;top:0;left:50%;transform:translateX(-50%);z-index:60;padding:8px 18px;border-radius:0 0 16px 16px;background:var(--ink);color:#fff;font-weight:900;font-size:15px;display:none;align-items:center;gap:8px;box-shadow:0 4px 16px rgba(0,0,0,.2);transition:transform .3s var(--spring)}
.combo-meter.show{display:flex;animation:comboSlide .3s var(--spring)}
.combo-meter.glow{box-shadow:0 0 20px 4px rgba(255,179,0,.4),0 4px 16px rgba(0,0,0,.2)}
.combo-meter .cm-mult{font-size:18px;color:var(--gold);text-shadow:0 0 8px rgba(255,179,0,.6)}
.combo-meter .cm-flame{font-size:16px}
@keyframes comboSlide{from{transform:translateX(-50%) translateY(-100%)}to{transform:translateX(-50%) translateY(0)}}

/* ===================== BOTTOM NAV (glassmorphism) ===================== */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.82);backdrop-filter:blur(20px) saturate(180%);-webkit-backdrop-filter:blur(20px) saturate(180%);border-top:1px solid var(--border);display:flex;z-index:55;padding:6px 0 env(safe-area-inset-bottom,6px)}
.bn-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 4px;border:none;background:none;cursor:pointer;font-size:10px;font-weight:800;color:var(--ink3);transition:color .2s,transform .15s var(--spring);position:relative}
.bn-item.active{color:var(--blue)}
.bn-item:active{transform:scale(.92)}
.bn-item .bn-ico{font-size:22px;transition:transform .2s var(--spring)}
.bn-item.active .bn-ico{transform:scale(1.15) translateY(-2px)}
.bn-badge{position:absolute;top:4px;right:50%;margin-right:-22px;background:var(--red);color:#fff;font-size:10px;font-weight:900;min-width:18px;height:18px;border-radius:9px;display:flex;align-items:center;justify-content:center;padding:0 5px;box-shadow:0 2px 8px rgba(255,75,75,.3);animation:popIn .3s var(--spring)}
body.dark .bottom-nav{background:rgba(26,26,46,.82)}

/* ===================== REWARD SCREEN (dopamine-optimized) ===================== */
.reward-screen{text-align:center;padding:1rem 0}
.reward-icon{font-size:64px;margin-bottom:.4rem;animation:popIn .5s var(--spring);filter:drop-shadow(0 4px 12px rgba(0,0,0,.1))}
.reward-title{font-size:26px;font-weight:900;margin-bottom:.3rem;letter-spacing:-.3px}
.reward-sub{font-size:15px;color:var(--ink2);font-weight:700;margin-bottom:1.2rem}
.reward-xp{display:inline-flex;align-items:center;gap:10px;background:linear-gradient(135deg,#ffd84d,#ff9800);color:#fff;padding:16px 32px;border-radius:22px;font-size:30px;font-weight:900;box-shadow:0 8px 24px rgba(255,152,0,.3);animation:popIn .4s var(--spring) .2s both}
.reward-xp .rxp-label{font-size:14px;font-weight:800;opacity:.9}
.reward-perfect{display:inline-flex;align-items:center;gap:8px;background:linear-gradient(135deg,#69f0ae,#2979ff);color:#fff;padding:10px 24px;border-radius:20px;font-size:16px;font-weight:900;margin-top:1rem;animation:popIn .5s var(--spring) .3s both;box-shadow:0 4px 16px rgba(105,240,174,.3)}
.reward-accuracy-ring{width:100px;height:100px;margin:1.2rem auto;position:relative}
.reward-accuracy-ring svg{transform:rotate(-90deg)}
.reward-accuracy-ring .ra-bg{fill:none;stroke:var(--border);stroke-width:8}
.reward-accuracy-ring .ra-fg{fill:none;stroke-width:8;stroke-linecap:round;transition:stroke-dashoffset 1.2s var(--spring)}
.reward-accuracy-ring .ra-val{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.reward-accuracy-ring .ra-num{font-size:28px;font-weight:900;line-height:1}
.reward-accuracy-ring .ra-lab{font-size:10px;color:var(--ink3);font-weight:800;text-transform:uppercase;letter-spacing:.05em;margin-top:2px}
.reward-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:.7rem;margin:1.4rem 0}
.reward-stat{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1rem .5rem;box-shadow:var(--shadow);transition:transform .2s var(--spring)}
.reward-stat:active{transform:scale(.95)}
.reward-stat .rs-v{font-size:22px;font-weight:900}
.reward-stat .rs-l{font-size:10px;color:var(--ink3);font-weight:800;text-transform:uppercase;letter-spacing:.04em;margin-top:3px}
.reward-levelup{background:linear-gradient(135deg,#69f0ae,#2979ff);color:#fff;padding:18px;border-radius:18px;margin:1rem 0;animation:popIn .5s var(--spring) .3s both;box-shadow:0 6px 20px rgba(105,240,174,.25)}
.reward-levelup .rlu-lv{font-size:40px;font-weight:900;line-height:1}
.reward-levelup .rlu-msg{font-size:14px;font-weight:700;margin-top:6px}
.reward-badges{margin:1rem 0}
.reward-badge{display:inline-flex;flex-direction:column;align-items:center;gap:6px;background:var(--card);border:2px solid var(--gold);border-radius:16px;padding:14px 18px;margin:0 6px;animation:popIn .5s var(--spring) .4s both;box-shadow:0 4px 16px rgba(255,179,0,.15)}
.reward-badge .rb-icon{font-size:36px}
.reward-badge .rb-title{font-size:13px;font-weight:900}
.reward-badge .rb-desc{font-size:11px;color:var(--ink3);font-weight:600}
.reward-investment-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px;margin:1rem 0;box-shadow:var(--shadow)}
.reward-investment-card .ric-title{font-size:12px;font-weight:900;color:var(--ink3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px}
.reward-investment-card .ric-stats{display:flex;justify-content:space-around;gap:8px}
.reward-investment-card .ric-stat{text-align:center}
.reward-investment-card .ric-v{font-size:20px;font-weight:900}
.reward-investment-card .ric-l{font-size:10px;color:var(--ink3);font-weight:700;margin-top:2px}
.reward-tomorrow{font-size:13px;color:var(--ink3);font-weight:600;margin-top:1rem;padding:10px 16px;background:var(--bg);border-radius:14px}
.reward-teaser{font-size:14px;font-weight:800;color:var(--blue);margin-top:10px;padding:12px 16px;background:linear-gradient(135deg,rgba(67,97,238,.08),rgba(67,97,238,.03));border:1px solid rgba(67,97,238,.15);border-radius:14px;line-height:1.4}
.reward-investment{font-size:12px;color:var(--ink3);font-weight:600;margin-top:8px;padding:10px 16px;background:var(--bg);border-radius:12px;font-style:italic}
.reward-actions{margin-top:1.2rem;display:flex;gap:10px}

/* ===================== THREAD FEED (dopamine-optimized) ===================== */
.feed-header{background:linear-gradient(135deg,#4361ee 0%,#7209b7 100%);color:#fff;padding:calc(env(safe-area-inset-top) + 1.2rem) 1.25rem 1.2rem;border-radius:0 0 28px 28px;position:relative;overflow:hidden}
.feed-header::after{content:'';position:absolute;top:-50%;right:-20%;width:200px;height:200px;background:radial-gradient(circle,rgba(255,255,255,.08),transparent 70%);border-radius:50%}
.feed-header-title{font-size:24px;font-weight:900;letter-spacing:-.5px;position:relative}
.feed-header-sub{font-size:12px;color:rgba(255,255,255,.75);font-weight:700;margin-top:4px;position:relative}
.feed-dots{display:flex;gap:5px;margin-top:10px;position:relative}
.feed-dot{width:28px;height:4px;border-radius:2px;background:rgba(255,255,255,.2);transition:background .3s}
.feed-dot.filled{background:#fff;box-shadow:0 0 8px rgba(255,255,255,.5)}

.thread-card{background:var(--card);border:1px solid var(--border);border-radius:20px;margin-bottom:16px;box-shadow:var(--shadow);overflow:hidden;animation:threadSlideIn .5s var(--spring) both;position:relative}
.thread-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#4361ee,#7209b7,#f72585);opacity:0;transition:opacity .3s}
.thread-card.unread::before{opacity:1}
@keyframes threadSlideIn{from{opacity:0;transform:translateY(20px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}

.thread-head{display:flex;align-items:flex-start;gap:12px;padding:16px 18px 10px}
.thread-emoji{font-size:32px;flex-shrink:0;line-height:1;filter:drop-shadow(0 2px 4px rgba(0,0,0,.1));animation:emojiPop .6s var(--spring) .2s both}
@keyframes emojiPop{from{transform:scale(0) rotate(-20deg)}to{transform:scale(1) rotate(0)}}
.thread-title{font-size:17px;font-weight:900;line-height:1.35;letter-spacing:-.3px;flex:1}
.thread-tag{display:inline-block;font-size:9px;font-weight:900;padding:3px 9px;border-radius:20px;letter-spacing:.5px;text-transform:uppercase;margin-left:6px;vertical-align:2px}
.thread-tag.t-Kanji{background:var(--blue-soft);color:var(--blue)}
.thread-tag.t-Grammar{background:var(--purple-soft);color:var(--purple)}
.thread-tag.t-Vocabulary{background:var(--green-soft);color:var(--green)}
.thread-tag.t-Culture{background:var(--gold-soft);color:var(--gold)}
.thread-tag.t-Listening{background:var(--red-soft);color:var(--red)}
.thread-tag.t-Reading{background:#e0f7fa;color:#00838f}
.thread-diff{display:inline-flex;align-items:center;gap:3px;font-size:9px;font-weight:900;padding:3px 8px;border-radius:20px;letter-spacing:.5px;text-transform:uppercase;margin-left:4px;vertical-align:2px}
.thread-diff-easy{background:#e8f5e9;color:#2e7d32}
.thread-diff-medium{background:#fff3e0;color:#ef6c00}
.thread-diff-hard{background:#fce4ec;color:#c62828}

.thread-posts{padding:0 18px 4px}
.thread-post{padding:12px 0;border-top:1px solid var(--border);font-size:14.5px;line-height:1.65;font-weight:500;color:var(--ink2);-webkit-user-select:text;user-select:text;-webkit-touch-callout:default;cursor:text;animation:postFade .4s ease both}
.thread-post:first-child{border-top:none;padding-top:6px}
.thread-post:nth-child(1){animation-delay:.15s}
.thread-post:nth-child(2){animation-delay:.3s}
.thread-post:nth-child(3){animation-delay:.45s}
.thread-post:nth-child(4){animation-delay:.6s}
.thread-post:nth-child(5){animation-delay:.75s}
.thread-post:nth-child(6){animation-delay:.9s}
@keyframes postFade{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
.thread-post .tp-num{font-size:10px;font-weight:900;color:var(--blue);margin-right:8px;vertical-align:2px;opacity:.7}
.thread-post:last-child{padding-bottom:14px}
.thread-post:last-child::after{content:' ✨';font-size:14px;opacity:.6}

.thread-cta{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;background:linear-gradient(135deg,rgba(67,97,238,.08),rgba(114,9,183,.08));border-top:1px solid var(--border);font-size:13px;font-weight:900;color:var(--blue);text-decoration:none;transition:background .2s,transform .1s}
.thread-cta:active{background:linear-gradient(135deg,rgba(67,97,238,.16),rgba(114,9,183,.16));transform:scale(.98)}
.thread-cta .cta-arrow{font-size:18px;transition:transform .2s}
.thread-cta:active .cta-arrow{transform:translateX(4px)}

/* Twitter-style thread connecting line */
.thread-post-line{position:relative}
.thread-post-line:not(:last-child)::before{content:'';position:absolute;left:11px;top:28px;bottom:-4px;width:2px;background:var(--border);border-radius:1px}
.thread-post-avatar{width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,#4361ee,#7209b7);flex-shrink:0;margin-top:2px;position:relative;z-index:1;display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;font-weight:900}
.thread-post-row{display:flex;gap:10px;align-items:flex-start}
.thread-post-content{flex:1;min-width:0}
.thread-post-name{font-size:11px;font-weight:900;color:var(--ink3);margin-bottom:3px;display:flex;align-items:center;gap:6px}
.thread-post-name .tpn-level{font-size:9px;padding:1px 6px;border-radius:10px;background:var(--blue-soft);color:var(--blue);font-weight:800}
.thread-post-text{font-size:14.5px;line-height:1.7;font-weight:500;color:var(--ink2);-webkit-user-select:text;user-select:text;cursor:text;animation:postFade .4s ease both}
.thread-post-actions{display:flex;gap:16px;margin-top:8px;padding-top:6px}
.tp-action{display:flex;align-items:center;gap:5px;font-size:12px;font-weight:700;color:var(--ink3);cursor:pointer;user-select:none;transition:color .2s,transform .1s;padding:4px 8px;border-radius:12px}
.tp-action:active{transform:scale(.92)}
.tp-action.liked{color:#e53935}
.tp-action.disliked{color:var(--ink3);opacity:.5}
.tp-action .tp-icon{font-size:15px;transition:transform .2s}
.tp-action.liked .tp-icon{animation:likePop .3s var(--spring)}
@keyframes likePop{0%{transform:scale(1)}50%{transform:scale(1.4)}100%{transform:scale(1)}}

.feed-more{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:16px;margin:0 0 2rem;border:2px dashed var(--border);border-radius:18px;background:transparent;font-size:14px;font-weight:800;color:var(--blue);cursor:pointer;transition:all .2s}
.feed-more:active{background:var(--blue-soft);border-color:var(--blue);transform:scale(.98)}

.feed-empty{text-align:center;padding:3rem 1.2rem 4rem}
.feed-empty-icon{font-size:56px;margin-bottom:1.2rem;animation:emojiPop .8s var(--spring)}
.feed-empty-title{font-size:20px;font-weight:900;margin-bottom:.6rem;letter-spacing:-.3px}
.feed-empty-sub{font-size:14px;color:var(--ink3);font-weight:600;line-height:1.6;max-width:280px;margin:0 auto}
.feed-timer{display:inline-flex;align-items:center;gap:8px;margin-top:1.4rem;padding:12px 24px;background:linear-gradient(135deg,var(--blue-soft),var(--purple-soft));border-radius:16px;font-size:14px;font-weight:900;color:var(--blue);animation:pulseTimer 2s ease-in-out infinite}
@keyframes pulseTimer{0%,100%{transform:scale(1)}50%{transform:scale(1.03)}}

.feed-loading{text-align:center;padding:3rem 1rem}
.feed-loading .fl-spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 1rem}
.feed-loading .fl-text{font-size:14px;font-weight:700;color:var(--ink3)}
@keyframes spin{to{transform:rotate(360deg)}}

body.dark .thread-card{border-color:var(--border)}
body.dark .thread-post{color:var(--ink2)}
body.dark .thread-tag.t-Kanji{background:rgba(67,97,238,.15);color:#7b9fff}
body.dark .thread-tag.t-Grammar{background:rgba(142,36,170,.15);color:#c084fc}
body.dark .thread-tag.t-Vocabulary{background:rgba(0,200,83,.12);color:#4ade80}
body.dark .thread-tag.t-Culture{background:rgba(255,179,0,.12);color:#fbbf24}
body.dark .thread-tag.t-Listening{background:rgba(255,75,75,.12);color:#f87171}
body.dark .thread-tag.t-Reading{background:rgba(0,131,143,.15);color:#22d3ee}
body.dark .thread-cta{background:linear-gradient(135deg,rgba(67,97,238,.12),rgba(114,9,183,.12))}
body.dark .feed-more{border-color:var(--border);color:#7b9fff}
body.dark .feed-more:active{background:rgba(67,97,238,.1)}
body.dark .feed-timer{background:linear-gradient(135deg,rgba(67,97,238,.1),rgba(142,36,170,.1))}

/* ===================== WEAK POINTS DASHBOARD ===================== */
.weak-dashboard{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:1.2rem;box-shadow:var(--shadow);margin-bottom:.8rem}
.weak-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.weak-title{font-size:15px;font-weight:900}
.weak-count{font-size:12px;font-weight:800;color:var(--red);background:var(--red-soft);padding:3px 10px;border-radius:20px}
.weak-empty{text-align:center;font-size:13px;color:var(--ink3);font-weight:600;padding:8px 0}
.weak-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-top:1px solid var(--border)}
.weak-item:first-of-type{border-top:none}
.weak-jp{font-family:'Noto Sans JP';font-size:16px;font-weight:800;flex:1}
.weak-meta{font-size:11px;color:var(--ink3);font-weight:600}
.weak-bar{width:50px;height:5px;background:var(--bg);border-radius:3px;overflow:hidden}
.weak-bar .f{height:100%;background:var(--red);border-radius:3px;transition:width .5s var(--spring)}
.weak-dim-tag{font-size:9px;font-weight:900;padding:2px 7px;border-radius:20px;text-transform:uppercase}
.weak-dim-tag.vocab{background:#e3f2fd;color:#1565c0}
.weak-dim-tag.grammar{background:#f3e5f5;color:#7b1fa2}
.weak-dim-tag.kanji{background:#e8f5e9;color:#2e7d32}

/* ===================== FURIGANA TOGGLE ===================== */
.furi-toggle{display:inline-flex;align-items:center;gap:6px;background:var(--bg);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-weight:800;cursor:pointer;color:var(--ink2)}
.furi-toggle.active{background:var(--blue-soft);color:var(--blue);border-color:var(--blue)}
.furi-toggle .ft-dot{width:8px;height:8px;border-radius:50%;background:var(--ink3)}
.furi-toggle.active .ft-dot{background:var(--blue)}
.furi-hidden{display:none}

/* ===================== BADGE GRID + GROWTH TREE ===================== */
.badge-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(72px,1fr));gap:.5rem;margin-top:.8rem}
.badge-cell{display:flex;flex-direction:column;align-items:center;gap:4px;text-align:center;padding:8px 4px;border-radius:12px;background:var(--card);border:1px solid var(--border);position:relative;overflow:hidden}
.badge-cell.earned{border-color:var(--gold);background:var(--gold-soft);box-shadow:0 2px 8px rgba(255,179,0,.15)}
.badge-cell.earned::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--gold),#ffd84d,var(--gold))}
.badge-cell.locked{opacity:.35}
.badge-cell .bc-icon{font-size:24px;transition:transform .3s var(--spring)}
.badge-cell.earned .bc-icon{animation:badgeShine 2s ease infinite}
.badge-cell .bc-title{font-size:9px;font-weight:800;line-height:1.2}
.badge-cell.locked .bc-icon{filter:grayscale(1)}
.badge-cell.newly-earned{animation:badgePop .6s var(--spring) both;box-shadow:0 0 0 3px var(--gold),0 4px 16px rgba(255,179,0,.3)}
@keyframes badgePop{0%{transform:scale(1)}30%{transform:scale(1.15)}100%{transform:scale(1)}}
.badge-cell .bc-ribbon{position:absolute;top:-2px;right:-2px;background:var(--gold);color:#fff;font-size:7px;font-weight:900;padding:2px 5px;border-radius:8px;letter-spacing:.05em;animation:badgeShine 1.5s ease infinite}
@keyframes badgeShine{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}

/* Growth Tree upgrade animation */
.gt-tree.upgraded{animation:treeUpgrade .8s var(--spring) both}
@keyframes treeUpgrade{0%{transform:scale(1)}30%{transform:scale(1.3) rotate(5deg);filter:drop-shadow(0 0 20px rgba(0,200,83,.6))}60%{transform:scale(1.1) rotate(-3deg)}100%{transform:scale(1) rotate(0)}}

/* Growth Tree */
.growth-tree-card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:1.2rem;box-shadow:var(--shadow);margin-top:.8rem;text-align:center}
.gt-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.gt-title{font-size:14px;font-weight:900}
.gt-retention{font-size:13px;font-weight:800}
.gt-tree{font-size:64px;line-height:1;margin:8px 0;transition:transform .5s var(--spring);animation:treeSway 4s ease-in-out infinite}
@keyframes treeSway{0%,100%{transform:rotate(-2deg)}50%{transform:rotate(2deg)}}
.gt-status{font-size:13px;font-weight:700;color:var(--ink2);margin-bottom:10px}
.gt-bar{height:10px;background:var(--bg);border-radius:5px;overflow:hidden;margin-bottom:6px}
.gt-bar .f{height:100%;border-radius:5px;transition:width 1s var(--spring)}
.gt-stats{display:flex;justify-content:center;gap:12px;margin-top:10px;font-size:11px;font-weight:700;color:var(--ink3);flex-wrap:wrap}
.gt-stats span{display:flex;flex-direction:column;align-items:center;gap:2px}
.gt-stats .gt-v{font-size:16px;font-weight:900;color:var(--ink)}
.gt-leaves{display:flex;justify-content:center;gap:3px;margin-top:8px;flex-wrap:wrap}
.gt-leaf{font-size:16px;animation:leafFall .8s ease both}
@keyframes leafFall{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}

/* old settings-bar CSS replaced by settings-dropdown above */

/* ===================== MANGA READER ===================== */
.manga-hub-head{text-align:center;margin-bottom:1.2rem}
.manga-hub-title{font-size:22px;font-weight:900;font-family:'Noto Sans JP'}
.manga-hub-sub{font-size:13px;color:var(--ink3);font-weight:600;margin-top:6px;line-height:1.5}
.manga-story-card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:1rem 1.1rem;margin-bottom:.8rem;box-shadow:var(--shadow);transition:border-color .2s;cursor:pointer;animation:slideUp .4s var(--spring) both}
.manga-story-card:active{transform:scale(.98)}
.manga-story-card:hover{border-color:var(--blue)}
.manga-sc-head{display:flex;align-items:center;gap:12px;margin-bottom:8px}
.manga-sc-cover{font-size:40px;flex-shrink:0;width:60px;height:60px;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#fff3e0,#fce4ec);border-radius:14px}
.manga-sc-info{flex:1;min-width:0}
.manga-sc-title{font-size:16px;font-weight:900;font-family:'Noto Sans JP';color:var(--ink)}
.manga-sc-titleen{font-size:12px;font-weight:700;color:var(--ink3);margin-top:2px}
.manga-sc-level{font-size:10px;font-weight:900;padding:3px 8px;border-radius:12px;flex-shrink:0}
.manga-sc-level.n5{background:var(--green-soft);color:var(--green)}
.manga-sc-level.n4{background:var(--blue-soft);color:var(--blue)}
.manga-sc-level.n3{background:#fff3e0;color:#e65100}
.manga-sc-desc{font-size:12px;color:var(--ink3);font-weight:600;line-height:1.5}
.manga-sc-meta{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}
.manga-sc-tag{font-size:10px;font-weight:700;color:var(--ink3);background:var(--bg);padding:3px 8px;border-radius:10px}
.manga-chapter-list{margin-top:10px}
.manga-chapter-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg);border-radius:12px;margin-bottom:6px;cursor:pointer;transition:background .2s}
.manga-chapter-item:active{background:var(--blue-soft)}
.manga-chapter-num{font-size:20px;font-weight:900;color:var(--blue);min-width:28px}
.manga-chapter-info{flex:1;min-width:0}
.manga-chapter-title{font-size:14px;font-weight:800;font-family:'Noto Sans JP'}
.manga-chapter-titleen{font-size:11px;color:var(--ink3);font-weight:600}
.manga-chapter-arrow{color:var(--ink3);font-size:18px}
.manga-chapter-done{color:var(--green);font-size:16px}

/* Panel reader */
.manga-reader-top{position:sticky;top:0;z-index:10;background:var(--bg);padding:10px 0;border-bottom:1px solid var(--border);margin-bottom:1rem}
.manga-reader-progress{display:flex;align-items:center;gap:10px}
.manga-reader-bar{flex:1;height:8px;background:var(--card);border-radius:4px;overflow:hidden}
.manga-reader-bar .f{height:100%;background:linear-gradient(90deg,var(--blue),var(--purple));border-radius:4px;transition:width .4s var(--spring)}
.manga-reader-count{font-size:12px;font-weight:800;color:var(--ink3);flex-shrink:0}
.manga-panel{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:1.4rem 1.2rem;margin-bottom:1rem;box-shadow:var(--shadow);animation:slideUp .4s var(--spring) both}
.manga-panel-emoji{font-size:56px;text-align:center;margin-bottom:1rem;animation:treeSway 3s ease-in-out infinite}
.manga-panel-jp{font-family:'Noto Sans JP';font-size:22px;font-weight:800;line-height:1.7;text-align:center;margin-bottom:10px;color:var(--ink)}
.manga-panel-reading{font-size:14px;font-weight:600;color:var(--ink3);text-align:center;margin-bottom:8px;letter-spacing:.02em}
.manga-panel-romaji{font-size:12px;font-weight:600;color:var(--ink3);text-align:center;margin-bottom:10px;font-style:italic;opacity:.7}
.manga-panel-en{font-size:14px;font-weight:600;color:var(--ink2);text-align:center;margin-bottom:12px;padding-top:10px;border-top:1px dashed var(--border)}
.manga-panel-audio{display:flex;justify-content:center;gap:8px;margin-bottom:12px}
.manga-panel-btn{background:var(--blue-soft);color:var(--blue);border:none;border-radius:20px;padding:7px 16px;font-size:12px;font-weight:800;cursor:pointer}
.manga-panel-btn:active{transform:scale(.94)}
.manga-panel-btn.furi{background:var(--purple-soft);color:var(--purple)}
.manga-panel-vocab{margin-top:12px;padding-top:12px;border-top:1px dashed var(--border)}
.manga-panel-vocab-title{font-size:11px;font-weight:800;color:var(--ink3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.manga-vocab-chip{display:inline-block;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:4px 10px;margin:3px 2px;font-size:12px;font-weight:700}
.manga-vocab-chip .vc-w{font-family:'Noto Sans JP';color:var(--ink);font-weight:800}
.manga-vocab-chip .vc-m{color:var(--ink3);font-size:11px}
.manga-panel-nav{display:flex;justify-content:space-between;gap:10px;margin-top:1rem}
.manga-nav-btn{padding:12px 20px;border:none;border-radius:14px;font-size:14px;font-weight:900;cursor:pointer;box-shadow:0 3px 0 rgba(0,0,0,.1)}
.manga-nav-btn:active{transform:translateY(3px);box-shadow:0 0 0 rgba(0,0,0,0)}
.manga-nav-btn.prev{background:var(--card);color:var(--ink3);border:1px solid var(--border)}
.manga-nav-btn.next{background:var(--blue);color:#fff;box-shadow:0 3px 0 #1565c0}
.manga-nav-btn.next:active{box-shadow:0 1px 0 #1565c0}
.manga-complete{text-align:center;padding:2rem 1rem;animation:slideUp .4s var(--spring) both}
.manga-complete-emoji{font-size:64px;margin-bottom:1rem;animation:treeSway 2s ease-in-out infinite}
.manga-complete-title{font-size:20px;font-weight:900;margin-bottom:8px}
.manga-complete-sub{font-size:14px;color:var(--ink3);font-weight:600;margin-bottom:1.5rem}

/* ===================== BONUS POPUP ===================== */
.bonus-pop{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:200;background:linear-gradient(135deg,#ffd84d,#ff9800);color:#fff;padding:20px 32px;border-radius:24px;font-size:22px;font-weight:900;box-shadow:0 8px 32px rgba(255,152,0,.4);animation:bonusPop 1.5s var(--spring) forwards;pointer-events:none;text-align:center}
.bonus-pop .bp-label{font-size:14px;font-weight:800;opacity:.9}
@keyframes bonusPop{0%{opacity:0;transform:translate(-50%,-50%) scale(.5)}20%{opacity:1;transform:translate(-50%,-50%) scale(1.1)}30%{transform:translate(-50%,-50%) scale(1)}80%{opacity:1;transform:translate(-50%,-50%) scale(1)}100%{opacity:0;transform:translate(-50%,-50%) scale(.9) translateY(-30px)}}

/* ===================== COUNT-UP ANIMATION ===================== */
.count-up{display:inline-block;font-variant-numeric:tabular-nums}

/* ===================== STRENGTHEN MODE TILE ===================== */
.strengthen-tile{display:flex;align-items:center;gap:13px;background:linear-gradient(135deg,#ff4b4b,#ff8a65);border-radius:16px;padding:13px 14px;cursor:pointer;box-shadow:var(--shadow);color:#fff;margin-bottom:.6rem;transition:transform .15s var(--spring)}
.strengthen-tile:active{transform:scale(.98)}
.strengthen-tile .st-icon{font-size:22px}
.strengthen-tile .st-name{font-size:15px;font-weight:800}
.strengthen-tile .st-sub{font-size:12px;color:rgba(255,255,255,.8);font-weight:600}

/* ===================== REVIEW MISTAKES BUTTON ===================== */
.mistakes-btn{width:100%;padding:14px;background:var(--red-soft);color:var(--red);border:2px solid #ffcdd2;border-radius:16px;font-size:15px;font-weight:900;cursor:pointer;margin-top:.8rem;transition:transform .15s var(--spring)}
.mistakes-btn:active{transform:scale(.97)}

/* ===================== MISC ===================== */
.empty-state{text-align:center;padding:2rem 1rem}
.empty-state .es-icon{font-size:48px;margin-bottom:.8rem}
.empty-state .es-title{font-size:18px;font-weight:900;margin-bottom:.4rem}
.empty-state .es-sub{font-size:14px;color:var(--ink3);font-weight:600;line-height:1.5}
@media (prefers-reduced-motion:reduce){*{animation-duration:.01ms!important;transition-duration:.01ms!important}}
.body{padding-bottom:calc(70px + env(safe-area-inset-bottom,0px))}

/* ===================== JLPT PLACEMENT TEST ===================== */
.jlpt-hub-head{margin:.2rem 0 1rem}
.jlpt-hub-title{font-size:20px;font-weight:900}
.jlpt-hub-sub{font-size:13px;color:var(--ink3);margin-top:4px;font-weight:600;line-height:1.5}
.jlpt-level-card{display:block;width:100%;text-align:left;background:var(--card);border:1.5px solid var(--border);border-radius:18px;padding:16px;margin-bottom:12px;box-shadow:var(--shadow);cursor:pointer;position:relative;transition:transform .15s var(--spring)}
.jlpt-level-card:active{transform:scale(.99)}
.jlpt-level-card.locked{opacity:.55;cursor:not-allowed}
